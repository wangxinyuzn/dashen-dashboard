<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>狼人杀新宇DM工具</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#f0f2f7;min-height:100vh}

/* Header */
.header{background:linear-gradient(135deg,#4f6ef7,#6c8bff);color:#fff;padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(79,110,247,.3)}
.header-left{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:700;letter-spacing:.5px}
.header-left span{font-size:22px}
.header-right{display:flex;align-items:center;gap:14px;font-size:13px;opacity:.9}
.header-tag{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);border-radius:12px;padding:2px 10px;font-size:12px}
.admin-btn{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.4);color:#fff;padding:3px 14px;border-radius:4px;font-size:12px;cursor:pointer}

/* Layout */
.layout{display:flex;min-height:calc(100vh - 52px)}

/* Sidebar */
.sidebar{width:180px;background:#fff;padding:20px 0;flex-shrink:0;border-right:1px solid #eef0f6;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto}
.sidebar-section{padding:8px 16px 4px;font-size:11px;color:#bbb;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.sidebar-item{padding:9px 20px;font-size:13px;color:#555;cursor:pointer;border-left:3px solid transparent;transition:all .15s;display:flex;align-items:center;gap:7px}
.sidebar-item:hover{background:#f5f7ff;color:#4f6ef7}
.sidebar-item.active{background:#f0f3ff;color:#4f6ef7;border-left-color:#4f6ef7;font-weight:600}
.sidebar-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* Main */
.main{flex:1;padding:20px 32px;overflow-y:auto;max-width:100%}

/* Card */
.card{background:#fff;border-radius:12px;padding:20px 22px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card-title{font-size:15px;font-weight:700;color:#222;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.card-icon{width:18px;height:18px;border-radius:4px;flex-shrink:0}

/* 7天日历 */
.week-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:4px}
.week-day{border-radius:10px;padding:10px 6px;text-align:center;border:1px solid #eef0f6;transition:background .15s}
.week-day.today{background:linear-gradient(135deg,#4f6ef7,#6c8bff);color:#fff;border-color:transparent;box-shadow:0 2px 8px rgba(79,110,247,.3)}
.week-day:not(.today){background:#f8f9ff}
.week-day .wd-week{font-size:11px;opacity:.7;margin-bottom:4px}
.week-day .wd-date{font-size:22px;font-weight:700;line-height:1;margin-bottom:2px}
.week-day .wd-month{font-size:11px;opacity:.7}
.week-day.today .wd-week,.week-day.today .wd-month{opacity:.85}
.week-day:not(.today) .wd-week{color:#888}
.week-day:not(.today) .wd-date{color:#333}
.week-day:not(.today) .wd-month{color:#aaa}

/* Q2目标进度 */
.goal-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.goal-row:last-child{margin-bottom:0}
.goal-name{font-size:13px;color:#555;width:190px;flex-shrink:0}
.goal-bar-wrap{flex:1;background:#f0f0f0;border-radius:6px;height:10px;overflow:hidden}
.goal-bar{height:100%;border-radius:6px;transition:width .6s ease}
.bar-blue{background:linear-gradient(90deg,#4f6ef7,#6c8bff)}
.bar-orange{background:linear-gradient(90deg,#fa8c16,#ffc53d)}
.bar-red{background:linear-gradient(90deg,#ff4d4f,#ff7875)}
.bar-green{background:linear-gradient(90deg,#52c41a,#95de64)}
.goal-value{font-size:12px;color:#888;width:110px;text-align:right;flex-shrink:0;white-space:nowrap}
.goal-pct{font-size:12px;font-weight:600;width:44px;text-align:right;flex-shrink:0}

/* KPI Cards */
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:4px}
.kpi-card{border:1px solid #eef0f6;border-radius:10px;padding:18px 20px;min-height:90px;display:flex;align-items:center;justify-content:center}
.kpi-num{font-size:48px;font-weight:800;color:#4f6ef7;letter-spacing:-2px;line-height:1}
/* 角色选取 */
.role-pick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.role-pick-col{display:flex;flex-direction:column}
.role-pick-label{font-size:14px;font-weight:700;text-align:center;padding:5px 0;margin-bottom:8px;border-radius:6px}
.role-pick-box{border:1px solid rgba(139,0,0,.2);border-radius:0 0 8px 8px;min-height:80px;padding:10px;display:flex;flex-wrap:wrap;gap:6px;align-content:flex-start;background:#0d1a12}
/* 角色图片卡片 */
.rp-img-card{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:transform .15s}
.rp-img-card:hover{transform:scale(1.06)}
.rp-img-card img{width:56px;height:56px;border-radius:8px;object-fit:cover;border:2px solid rgba(109,40,217,.4)}
.rp-img-card span{font-size:10px;color:#c4b5fd;text-align:center;line-height:1.2}
/* 角色选取 tag */
.rp-tag{font-size:12px;padding:3px 10px;border-radius:12px;cursor:pointer;border:1px solid transparent;transition:all .15s;user-select:none}
.rp-tag:hover{opacity:.8}

/* 数字选号按钮 */
.num-picker{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.num-btn{width:44px;height:44px;border-radius:50%;border:2px solid #e0e6ff;background:#f5f7ff;font-size:15px;font-weight:700;color:#4f6ef7;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.num-btn:hover{background:#4f6ef7;color:#fff;border-color:#4f6ef7;transform:scale(1.1)}
.num-btn.selected{background:#4f6ef7;color:#fff;border-color:#4f6ef7}
.num-btn.tuishui{background:#fa8c16;color:#fff;border-color:#fa8c16}
.kpi-num{font-size:32px;font-weight:800;color:#4f6ef7;letter-spacing:-1px;line-height:1.4;word-break:break-all;text-align:center}
.kpi-num-wrap{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;align-items:center;padding:6px}
.kpi-num-wrap .num-circle{width:44px;height:44px;border-radius:50%;border:2px solid #4f6ef7;background:#f0f3ff;color:#4f6ef7;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.kpi-num-wrap.unsel .num-circle{border-color:#52c41a;background:#f6ffed;color:#52c41a}
.kpi-num-dash{font-size:28px;font-weight:700;color:#ccc}
/* 方框标签 */
.box-wrap{display:flex;flex-direction:column}
.box-label{display:block;padding:5px 16px;border-radius:8px 8px 0 0;font-size:16px;font-weight:700;text-align:center}

/* 分析卡片 */
.analysis-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.analysis-item{background:#f8f9ff;border-radius:8px;padding:14px 16px}
.analysis-tag{font-size:11px;font-weight:700;color:#4f6ef7;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.analysis-title{font-size:13px;font-weight:600;color:#333;margin-bottom:6px}
.analysis-text{font-size:12px;color:#666;line-height:1.7}

/* TODO */
.todo-list{list-style:none}
.todo-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #f5f5f5;font-size:13px;color:#444}
.todo-item:last-child{border-bottom:none}
.todo-check{width:18px;height:18px;border:2px solid #d9d9d9;border-radius:4px;flex-shrink:0;margin-top:1px}

/* 卡牌展示 */
.role-tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.role-tab{padding:5px 16px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid #d9d9d9;background:#f5f5f5;color:#666;transition:all .15s}
.role-tab.active{background:#4f6ef7;color:#fff;border-color:#4f6ef7}
.role-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:12px}
.role-card{display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px 6px;border-radius:10px;background:#f8f9ff;border:1px solid #eef0f6;cursor:pointer;transition:all .15s;text-align:center}
.role-card:hover{border-color:#4f6ef7;background:#f0f3ff;transform:translateY(-2px)}
.role-avatar{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#2d0a5e,#4f6ef7);display:flex;align-items:center;justify-content:center;font-size:22px;border:2px solid #c4b5fd;overflow:hidden;flex-shrink:0}
.role-avatar img{width:100%;height:100%;object-fit:cover}
.role-name{font-size:11px;color:#444;font-weight:600;line-height:1.3}
.role-camp{font-size:10px;padding:1px 6px;border-radius:8px;margin-top:2px}
.camp-wolf{background:#fff1f0;color:#cf1322}
.camp-good{background:#f0f3ff;color:#4f6ef7}
.camp-third{background:#fffbe6;color:#d48806}

/* 死亡情况 */
.death-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.death-card{position:relative;border-radius:8px;overflow:hidden;cursor:pointer;aspect-ratio:2/3;transition:transform .2s,box-shadow .2s;user-select:none;max-width:90px}
.death-card:hover{transform:translateY(-3px);box-shadow:0 6px 16px rgba(0,0,0,.18)}
.death-card-back{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(160deg,#1a0533 0%,#2d0a5e 40%,#1a0533 100%);border:2px solid #6b21a8;position:relative;overflow:hidden}
.death-card-back::before{content:'';position:absolute;inset:4px;border:1px solid rgba(167,139,250,.35);border-radius:5px;pointer-events:none}
.death-card-pattern{position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 8px,rgba(109,40,217,.1) 8px,rgba(109,40,217,.1) 9px)}
.death-card-number{font-size:32px;font-weight:800;color:rgba(221,214,254,.9);line-height:1;z-index:1;text-shadow:0 0 10px rgba(167,139,250,.6)}
.death-card-wolf{font-size:14px;margin-top:4px;z-index:1;opacity:.7}
.death-card.dead .death-card-back{background:linear-gradient(160deg,#ccc 0%,#e0e0e0 40%,#ccc 100%);border-color:#bbb;filter:grayscale(1) brightness(1.1)}
.death-card.dead::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,.5);z-index:2;border-radius:8px}
.death-card.dead .death-skull{display:flex!important}
.death-skull{display:none;position:absolute;inset:0;z-index:3;align-items:center;justify-content:center;font-size:28px;filter:drop-shadow(0 0 6px rgba(255,0,0,.6))}

/* 趋势图 */
.chart-wrap{position:relative;height:220px}

/* 分隔线 */
.divider{border:none;border-top:1px solid #f0f2f7;margin:16px 0}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span>🐒</span> 狼人杀新宇DM工具
  </div>
  <div class="header-right">
    <span class="header-tag">📅 每周自动更新</span>
    <span id="today-label"></span>
    <button class="admin-btn">🔒 管理员</button>
  </div>
</div>

<div class="layout">

  <div class="main">

    <!-- 7天日历 -->
    <div class="card">
      <div class="card-title">
        <span class="card-icon" style="background:linear-gradient(135deg,#eb2f96,#ff85c2)"></span>
        本周日历
      </div>
      <div class="week-cal" id="week-cal"></div>
    </div>

    <!-- 角色选取 -->
    <div class="card">
      <div class="card-title">
        <span class="card-icon" style="background:linear-gradient(135deg,#7c3aed,#c084fc)"></span>
        角色选取
      </div>
      <div class="role-pick-grid">
        <div class="role-pick-col">
          <div class="role-pick-label" style="background:rgba(30,64,175,.2);color:#93c5fd">好人</div>
          <div class="role-pick-box" id="rp-good"></div>
        </div>
        <div class="role-pick-col">
          <div class="role-pick-label" style="background:rgba(109,40,217,.2);color:#c4b5fd">神职</div>
          <div class="role-pick-box" id="rp-shen"></div>
        </div>
        <div class="role-pick-col">
          <div class="role-pick-label" style="background:rgba(139,0,0,.25);color:#f87171">狼人</div>
          <div class="role-pick-box" id="rp-wolf"></div>
        </div>
        <div class="role-pick-col">
          <div class="role-pick-label" style="background:rgba(120,53,15,.2);color:#fcd34d">三方</div>
          <div class="role-pick-box" id="rp-third"></div>
        </div>
      </div>
    </div>

    <!-- 上警情况 -->
    <div class="card">
      <div class="card-title">
        <span class="card-icon" style="background:linear-gradient(135deg,#52c41a,#95de64)"></span>
        上警情况
      </div>
      <!-- 1-15 数字选号 -->
      <div class="num-picker" id="num-picker"></div>
      <!-- 三个方框 -->
      <div class="kpi-grid">
        <div class="box-wrap">
          <span class="box-label" style="background:#e8edff;color:#4f6ef7">上警</span>
          <div class="kpi-card" id="kpi-box-1" style="border-top-left-radius:0;border-top-right-radius:0">
            <div class="kpi-num-wrap" id="kpi-num-1"></div>
          </div>
        </div>
        <div class="box-wrap">
          <span class="box-label" style="background:#fff7e6;color:#fa8c16">退水</span>
          <div class="kpi-card" id="kpi-box-2" style="border-top-left-radius:0;border-top-right-radius:0">
            <div class="kpi-num-wrap" id="kpi-num-2"></div>
          </div>
        </div>
        <div class="box-wrap">
          <span class="box-label" style="background:#f6ffed;color:#52c41a">警下</span>
          <div class="kpi-card" id="kpi-box-3" style="border-top-left-radius:0;border-top-right-radius:0">
            <div class="kpi-num-wrap" id="kpi-num-3"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 卡牌展示 -->
    <div class="card">
      <div class="card-title">
        <span class="card-icon" style="background:linear-gradient(135deg,#7c3aed,#c084fc)"></span>
        卡牌展示
      </div>
      <div class="role-tabs">
        <div class="role-tab active" onclick="filterRoles('all',this)">全部卡牌</div>
        <div class="role-tab" onclick="filterRoles('wolf',this)">🐺 狼人阵营</div>
        <div class="role-tab" onclick="filterRoles('good',this)">✨ 好人阵营</div>
        <div class="role-tab" onclick="filterRoles('third',this)">🌙 第三方阵营</div>
      </div>
      <div class="role-grid" id="role-grid"></div>
    </div>

    <!-- 死亡情况 -->
    <div class="card">
      <div class="card-title">
        <span class="card-icon" style="background:linear-gradient(135deg,#1a0533,#6b21a8)"></span>
        死亡情况
        <span style="font-size:12px;color:#aaa;font-weight:400;margin-left:4px">（点击卡片标记死亡）</span>
        <button onclick="resetDeathCards()" style="margin-left:auto;background:#f5f5f5;border:1px solid #e0e0e0;border-radius:6px;padding:3px 12px;font-size:12px;color:#666;cursor:pointer;transition:background .15s" onmouseover="this.style.background='#eee'" onmouseout="this.style.background='#f5f5f5'">🔄 复原</button>
      </div>
      <div class="death-grid" id="death-grid"></div>
    </div>

  </div>
</div>

<script>
// 卡牌展示
const ROLES = [
  // 狼人阵营
  {name:'狼人',camp:'wolf',emoji:'🐺'},{name:'狼美人',camp:'wolf',emoji:'🐺'},{name:'隐狼',camp:'wolf',emoji:'🐺'},
  {name:'狼王',camp:'wolf',emoji:'🐺'},{name:'白狼王',camp:'wolf',emoji:'🐺'},{name:'狼巫',camp:'wolf',emoji:'🐺'},
  {name:'蚀时狼妃',camp:'wolf',emoji:'🐺'},{name:'觉醒狼王',camp:'wolf',emoji:'🐺'},{name:'觉醒隐狼',camp:'wolf',emoji:'🐺'},
  {name:'狼鸦之爪',camp:'wolf',emoji:'🐺'},
  // 好人阵营
  {name:'预言家',camp:'good',emoji:'🔮'},{name:'女巫',camp:'good',emoji:'🧪'},{name:'猎人',camp:'good',emoji:'🏹'},
  {name:'守卫',camp:'good',emoji:'🛡️'},{name:'骑士',camp:'good',emoji:'⚔️'},{name:'魔术师',camp:'good',emoji:'🎩'},
  {name:'摄梦人',camp:'good',emoji:'💤'},{name:'白昼学者',camp:'good',emoji:'📚'},{name:'寂夜导师',camp:'good',emoji:'🌙'},
  {name:'蚀日侍女',camp:'good',emoji:'☀️'},{name:'纯白之女',camp:'good',emoji:'🕊️'},{name:'炼金魔女',camp:'good',emoji:'⚗️'},
  {name:'定序王子',camp:'good',emoji:'👑'},{name:'奇迹商人',camp:'good',emoji:'💰'},{name:'愚者',camp:'good',emoji:'🃏'},
  {name:'平民',camp:'good',emoji:'👤'},{name:'警长',camp:'good',emoji:'⭐'},{name:'丘比特',camp:'good',emoji:'💘'},
  {name:'守墓人',camp:'good',emoji:'⚰️'},{name:'恶夜骑士',camp:'good',emoji:'🌑'},{name:'猎魔人',camp:'good',emoji:'🗡️'},
  // 第三方阵营
  {name:'白猫',camp:'third',emoji:'🐱'},{name:'咒狐',camp:'third',emoji:'🦊'},{name:'子狐',camp:'third',emoji:'🦊'},
  {name:'河豚',camp:'third',emoji:'🐡'},{name:'熊',camp:'third',emoji:'🐻'},{name:'羊驼',camp:'third',emoji:'🦙'},
  {name:'乌鸦',camp:'third',emoji:'🐦'},{name:'石像鬼',camp:'third',emoji:'👻'},{name:'孤独少女',camp:'third',emoji:'👧'},
  {name:'魔镜少女',camp:'third',emoji:'🪞'},{name:'噩梦之影',camp:'third',emoji:'😱'},{name:'流光伯爵',camp:'third',emoji:'🧛'},
  {name:'千面人',camp:'third',emoji:'🎭'},{name:'赤月使徒',camp:'third',emoji:'🌕'},{name:'赤月使徒',camp:'third',emoji:'🌹'},
];

const CAMP_LABELS = {wolf:'狼人',good:'好人',third:'第三方'};
let currentCamp = 'all';

function renderRoles(camp){
  const grid = document.getElementById('role-grid');
  const list = camp==='all' ? ROLES : ROLES.filter(r=>r.camp===camp);
  grid.innerHTML = list.map(r=>`
    <div class="role-card">
      <div class="role-avatar">${r.emoji}</div>
      <div class="role-name">${r.name}</div>
      <div class="role-camp camp-${r.camp}">${CAMP_LABELS[r.camp]}</div>
    </div>`).join('');
}

function filterRoles(camp, el){
  currentCamp = camp;
  document.querySelectorAll('.role-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderRoles(camp);
}

renderRoles('all');

// 角色选取
(function(){
  const goodRoles  = ['平民','平民','平民','平民','平民'];
  const shenRoles  = [
    {name:'预言家', img:'roles/预言家.jpg'},
    {name:'女巫',   img:'roles/女巫.jpg'},
    {name:'猎人',   img:'roles/猎人.png'},
    {name:'守卫',   img:'roles/守卫.jpg'},
    {name:'骑士',   img:'roles/骑士.jpg'},
    {name:'魔术师', img:'roles/魔术师.jpg'},
    {name:'摄梦人', img:'roles/摄梦人.jpg'},
    {name:'守墓人', img:'roles/守墓人.jpg'},
    {name:'猎魔人', img:'roles/猎魔人.jpg'},
    {name:'乌鸦',   img:'roles/乌鸦.jpg'},
    {name:'白痴',   img:'roles/白痴.jpg'},
    {name:'禁言长老',img:'roles/禁言长老.jpg'},
  ];
  const wolfRoles  = [
    {name:'狼人',   img:'roles/狼人.jpg'},
    {name:'狼美人', img:'roles/狼美人.png'},
    {name:'隐狼',   img:'roles/隐狼.jpg'},
    {name:'狼王',   img:'roles/狼王.png'},
    {name:'白狼王', img:'roles/白狼王.png'},
    {name:'恶灵骑士',img:'roles/恶灵骑士.jpg'},
    {name:'恶灵之影',img:'roles/恶灵之影.jpg'},
    {name:'暗恋者', img:'roles/暗恋者.png'},
    {name:'石像鬼', img:'roles/石像鬼.jpg'},
    {name:'血月使徒',img:'roles/血月使徒.jpg'},
  ];

    wolf:  {bg:'rgba(139,0,0,.2)',     color:'#f87171',  border:'rgba(192,57,43,.4)'},

      <div class="rp-img-card">

  renderTagBox('rp-good',  goodRoles,  'good');

  renderTagBox('rp-third', thirdRoles, 'third');

// 数字选号（警下→上警→退水，点上警池圆圈才退水）
(function(){
  const picker = document.getElementById('num-picker');
  const box1 = document.getElementById('kpi-num-1');
  const box2 = document.getElementById('kpi-num-2');
  const box3 = document.getElementById('kpi-num-3');
  const states = {};
  for(let i=1;i<=15;i++) states[i]=0;

  function refresh(){
    const shangJing=[], tuiShui=[], jingXia=[];
    for(let i=1;i<=15;i++){
      if(states[i]===1) shangJing.push(i);
      else if(states[i]===2) tuiShui.push(i);
      else jingXia.push(i);
    }
    // 上警圆圈：点击可退水
    box1.innerHTML = shangJing.length
      ? shangJing.map(n=>`<div class="num-circle" style="border-color:#fbbf24;background:rgba(251,191,36,.1);color:#fbbf24;cursor:pointer" title="点击退水" onclick="moveToTuishui(${n})">${n}</div>`).join('')
      : '<span class="kpi-num-dash">—</span>';
    // 退水圆圈：不可点击
    box2.innerHTML = tuiShui.length
      ? tuiShui.map(n=>`<div class="num-circle" style="border-color:#c0392b;background:rgba(192,57,43,.1);color:#c0392b">${n}</div>`).join('')
      : '<span class="kpi-num-dash">—</span>';
    // 警下圆圈
    box3.innerHTML = jingXia.length
      ? jingXia.map(n=>`<div class="num-circle" style="border-color:#374151;background:#1a2820;color:#6b7280">${n}</div>`).join('')
      : '<span class="kpi-num-dash">—</span>';
  }

  window.moveToTuishui = function(n){
    if(states[n]===1){ states[n]=2; refresh();
      // 同步按钮颜色
      const btn = picker.querySelector(`.num-btn[data-n="${n}"]`);
      if(btn){ btn.classList.remove('selected'); btn.classList.add('tuishui'); }
    }
  };

  for(let i=1;i<=15;i++){
    const btn = document.createElement('button');
    btn.className = 'num-btn';
    btn.textContent = i;
    btn.dataset.n = i;
    btn.onclick = function(){
      if(states[i]===0){
        states[i]=1;
        btn.classList.add('selected');
        refresh();
      }
      // 上警/退水状态不响应
    };
    picker.appendChild(btn);
  }
  refresh();
})();

// 7天日历
(function(){
  const cal = document.getElementById('week-cal');
  const weekNames = ['周日','周一','周二','周三','周四','周五','周六'];
  const today = new Date();
  today.setHours(0,0,0,0);
  for(let i=0;i<7;i++){
    const d = new Date(today); d.setDate(today.getDate()+i);
    const isToday = i===0;
    const div = document.createElement('div');
    div.className = 'week-day' + (isToday?' today':'');
    div.innerHTML =
      `<div class="wd-week">${weekNames[d.getDay()]}</div>`+
      `<div class="wd-date">${d.getDate()}</div>`+
      `<div class="wd-month">${d.getMonth()+1}月</div>`;
    cal.appendChild(div);
  }
})();

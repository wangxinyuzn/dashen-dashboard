<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>狼人杀新宇DM工具</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#f0f2f7;min-height:100vh}

/* Header */
.header{background:linear-gradient(135deg,#4f6ef7,#6c8bff);color:#fff;padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(79,110,247,.3)}
.header-left{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:700;letter-spacing:.5px}
.header-left span{font-size:22px}
.header-right{display:flex;align-items:center;gap:14px;font-size:13px;opacity:.9}
.header-tag{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);border-radius:12px;padding:2px 10px;font-size:12px}
.admin-btn{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.4);color:#fff;padding:3px 14px;border-radius:4px;font-size:12px;cursor:pointer}

/* Layout */
.layout{display:flex;min-height:calc(100vh - 52px)}

/* Sidebar */
.sidebar{width:180px;background:#fff;padding:20px 0;flex-shrink:0;border-right:1px solid #eef0f6;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto}
.sidebar-section{padding:8px 16px 4px;font-size:11px;color:#bbb;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.sidebar-item{padding:9px 20px;font-size:13px;color:#555;cursor:pointer;border-left:3px solid transparent;transition:all .15s;display:flex;align-items:center;gap:7px}
.sidebar-item:hover{background:#f5f7ff;color:#4f6ef7}
.sidebar-item.active{background:#f0f3ff;color:#4f6ef7;border-left-color:#4f6ef7;font-weight:600}
.sidebar-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* Main */
.main{flex:1;padding:20px 24px;overflow-y:auto;max-width:1100px}

/* Card */
.card{background:#fff;border-radius:12px;padding:20px 22px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card-title{font-size:15px;font-weight:700;color:#222;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.card-icon{width:18px;height:18px;border-radius:4px;flex-shrink:0}

/* 7天日历 */
.week-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:4px}
.week-day{border-radius:10px;padding:10px 6px;text-align:center;border:1px solid #eef0f6;transition:background .15s}
.week-day.today{background:linear-gradient(135deg,#4f6ef7,#6c8bff);color:#fff;border-color:transparent;box-shadow:0 2px 8px rgba(79,110,247,.3)}
.week-day:not(.today){background:#f8f9ff}
.week-day .wd-week{font-size:11px;opacity:.7;margin-bottom:4px}
.week-day .wd-date{font-size:22px;font-weight:700;line-height:1;margin-bottom:2px}
.week-day .wd-month{font-size:11px;opacity:.7}
.week-day.today .wd-week,.week-day.today .wd-month{opacity:.85}
.week-day:not(.today) .wd-week{color:#888}
.week-day:not(.today) .wd-date{color:#333}
.week-day:not(.today) .wd-month{color:#aaa}

/* Q2目标进度 */
.goal-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.goal-row:last-child{margin-bottom:0}
.goal-name{font-size:13px;color:#555;width:190px;flex-shrink:0}
.goal-bar-wrap{flex:1;background:#f0f0f0;border-radius:6px;height:10px;overflow:hidden}
.goal-bar{height:100%;border-radius:6px;transition:width .6s ease}
.bar-blue{background:linear-gradient(90deg,#4f6ef7,#6c8bff)}
.bar-orange{background:linear-gradient(90deg,#fa8c16,#ffc53d)}
.bar-red{background:linear-gradient(90deg,#ff4d4f,#ff7875)}
.bar-green{background:linear-gradient(90deg,#52c41a,#95de64)}
.goal-value{font-size:12px;color:#888;width:110px;text-align:right;flex-shrink:0;white-space:nowrap}
.goal-pct{font-size:12px;font-weight:600;width:44px;text-align:right;flex-shrink:0}

/* KPI Cards */
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:4px}
.kpi-card{border:1px solid #eef0f6;border-radius:10px;padding:18px 20px;min-height:90px;display:flex;align-items:center;justify-content:center}
.kpi-num{font-size:48px;font-weight:800;color:#4f6ef7;letter-spacing:-2px;line-height:1}
/* 数字选号按钮 */
.num-picker{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.num-btn{width:44px;height:44px;border-radius:50%;border:2px solid #e0e6ff;background:#f5f7ff;font-size:15px;font-weight:700;color:#4f6ef7;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.num-btn:hover{background:#4f6ef7;color:#fff;border-color:#4f6ef7;transform:scale(1.1)}
.num-btn.selected{background:#4f6ef7;color:#fff;border-color:#4f6ef7}
.kpi-num{font-size:32px;font-weight:800;color:#4f6ef7;letter-spacing:-1px;line-height:1.4;word-break:break-all;text-align:center}
.kpi-num-wrap{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;align-items:center;padding:6px}
.kpi-num-wrap .num-circle{width:44px;height:44px;border-radius:50%;border:2px solid #4f6ef7;background:#f0f3ff;color:#4f6ef7;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.kpi-num-wrap.unsel .num-circle{border-color:#52c41a;background:#f6ffed;color:#52c41a}
.kpi-num-dash{font-size:28px;font-weight:700;color:#ccc}

/* 分析卡片 */
.analysis-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.analysis-item{background:#f8f9ff;border-radius:8px;padding:14px 16px}
.analysis-tag{font-size:11px;font-weight:700;color:#4f6ef7;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.analysis-title{font-size:13px;font-weight:600;color:#333;margin-bottom:6px}
.analysis-text{font-size:12px;color:#666;line-height:1.7}

/* TODO */
.todo-list{list-style:none}
.todo-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #f5f5f5;font-size:13px;color:#444}
.todo-item:last-child{border-bottom:none}
.todo-check{width:18px;height:18px;border:2px solid #d9d9d9;border-radius:4px;flex-shrink:0;margin-top:1px}

/* 死亡情况 */
.death-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.death-card{position:relative;border-radius:10px;overflow:hidden;cursor:pointer;aspect-ratio:2/3;transition:transform .2s,box-shadow .2s;user-select:none}
.death-card:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,0,0,.18)}
.death-card-back{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(160deg,#1a0533 0%,#2d0a5e 40%,#1a0533 100%);border:2px solid #6b21a8;position:relative;overflow:hidden}
.death-card-back::before{content:'';position:absolute;inset:6px;border:1px solid rgba(167,139,250,.35);border-radius:6px;pointer-events:none}
.death-card-back::after{content:'☽ 🐺 ☾';font-size:18px;display:block;line-height:1}
.death-card-pattern{position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 8px,rgba(109,40,217,.1) 8px,rgba(109,40,217,.1) 9px)}
.death-card-num{position:absolute;top:6px;left:8px;font-size:11px;font-weight:700;color:rgba(196,181,253,.7)}
.death-card-num2{position:absolute;bottom:6px;right:8px;font-size:11px;font-weight:700;color:rgba(196,181,253,.7);transform:rotate(180deg)}
.death-card.dead .death-card-back{background:linear-gradient(160deg,#1f0000 0%,#450a0a 40%,#1f0000 100%);border-color:#dc2626;filter:brightness(.65)}
.death-card.dead::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,.5);z-index:2;border-radius:10px}
.death-card.dead .death-skull{display:flex!important}
.death-skull{display:none;position:absolute;inset:0;z-index:3;align-items:center;justify-content:center;font-size:36px;filter:drop-shadow(0 0 6px rgba(255,0,0,.6))}

/* 趋势图 */
.chart-wrap{position:relative;height:220px}

/* 分隔线 */
.divider{border:none;border-top:1px solid #f0f2f7;margin:16px 0}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span>🐒</span> 狼人杀新宇DM工具
  </div>
  <div class="header-right">
    <span class="header-tag">📅 每周自动更新</span>
    <span id="today-label"></span>
    <button class="admin-btn">🔒 管理员</button>
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-section">板块</div>
    <div class="sidebar-item active" onclick="setActive(this)">
      <span class="sidebar-dot" style="background:#4f6ef7"></span> 短视频官号
    </div>
    <div class="sidebar-item" onclick="setActive(this)">
      <span class="sidebar-dot" style="background:#52c41a"></span> 长视频官号
    </div>
    <div class="sidebar-item" onclick="setActive(this)">
      <span class="sidebar-dot" style="background:#eb2f96"></span> 公众号
    </div>
  </div>

  <div class="main">

    <!-- 7天日历 -->
    <div class="card">
      <div class="card-title">
        <span class="card-icon" style="background:linear-gradient(135deg,#eb2f96,#ff85c2)"></span>
        本周日历
      </div>
      <div class="week-cal" id="week-cal"></div>
    </div>

    <!-- 上警情况 -->
    <div class="card">
      <div class="card-title">
        <span class="card-icon" style="background:linear-gradient(135deg,#52c41a,#95de64)"></span>
        上警情况
      </div>
      <!-- 1-15 数字选号 -->
      <div class="num-picker" id="num-picker"></div>
      <!-- 三个方框 -->
      <div class="kpi-grid">
        <div class="kpi-card" id="kpi-box-1">
          <div class="kpi-num-wrap" id="kpi-num-1"></div>
        </div>
        <div class="kpi-card" id="kpi-box-2">
          <div class="kpi-num" id="kpi-num-2" style="color:#fa8c16">—</div>
        </div>
        <div class="kpi-card" id="kpi-box-3">
          <div class="kpi-num-wrap" id="kpi-num-3" style="font-size:20px"></div>
        </div>
      </div>
    </div>

    <!-- 死亡情况 -->
    <div class="card">
      <div class="card-title">
        <span class="card-icon" style="background:linear-gradient(135deg,#1a0533,#6b21a8)"></span>
        死亡情况
        <span style="font-size:12px;color:#aaa;font-weight:400;margin-left:4px">（点击卡片标记死亡）</span>
      </div>
      <div class="death-grid" id="death-grid"></div>
    </div>

  </div>
</div>

<script>
// 死亡情况卡片
(function(){
  const grid = document.getElementById('death-grid');
  for(let i=1;i<=15;i++){
    const card = document.createElement('div');
    card.className = 'death-card';
    card.innerHTML = `
      <div class="death-card-back">
        <div class="death-card-pattern"></div>
        <div class="death-card-num">${i}</div>
        <div class="death-card-num2">${i}</div>
      </div>
      <div class="death-skull">💀</div>`;
    card.onclick = () => card.classList.toggle('dead');
    grid.appendChild(card);
  }
})();

// 数字选号
(function(){
  const picker = document.getElementById('num-picker');
  const box1 = document.getElementById('kpi-num-1');
  const box3 = document.getElementById('kpi-num-3');
  const selected = new Set();

  function renderCircles(el, nums, cls){
    el.className = 'kpi-num-wrap' + (cls?' '+cls:'');
    if(!nums.length){ el.innerHTML = '<span class="kpi-num-dash">—</span>'; return; }
    el.innerHTML = nums.map(n=>`<div class="num-circle">${n}</div>`).join('');
  }

  function refresh(){
    const sel = [...selected].sort((a,b)=>a-b);
    const unsel = Array.from({length:15},(_,i)=>i+1).filter(n=>!selected.has(n));
    renderCircles(box1, sel, '');
    renderCircles(box3, unsel, 'unsel');
  }

  for(let i=1;i<=15;i++){
    const btn = document.createElement('button');
    btn.className = 'num-btn';
    btn.textContent = i;
    btn.onclick = function(){
      if(selected.has(i)){ selected.delete(i); btn.classList.remove('selected'); }
      else { selected.add(i); btn.classList.add('selected'); }
      refresh();
    };
    picker.appendChild(btn);
  }
  refresh();
})();

// 7天日历
(function(){
  const cal = document.getElementById('week-cal');
  const weekNames = ['周日','周一','周二','周三','周四','周五','周六'];
  const today = new Date();
  today.setHours(0,0,0,0);
  for(let i=0;i<7;i++){
    const d = new Date(today); d.setDate(today.getDate()+i);
    const isToday = i===0;
    const div = document.createElement('div');
    div.className = 'week-day' + (isToday?' today':'');
    div.innerHTML =
      `<div class="wd-week">${weekNames[d.getDay()]}</div>`+
      `<div class="wd-date">${d.getDate()}</div>`+
      `<div class="wd-month">${d.getMonth()+1}月</div>`;
    cal.appendChild(div);
  }
})();

// 日期
const d = new Date();
const weekdays = ['周日','周一','周二','周三','周四','周五','周六'];
document.getElementById('today-label').textContent =
  d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日 '+weekdays[d.getDay()];

// 侧边栏
function setActive(el) {
  document.querySelectorAll('.sidebar-item').forEach(i=>i.classList.remove('active'));
  el.classList.add('active');
}

// 趋势图
const ctx = document.getElementById('trend-chart').getContext('2d');
new Chart(ctx, {
  type: 'line',
  data: {
    labels: ['W13','W14','W15','W16','W17','W18','W19','W20'],
    datasets: [{
      label: '抖音播放量（万）',
      data: [45, 52, 38, 61, 35, 28, 63, 32.1],
      borderColor: '#4f6ef7',
      backgroundColor: 'rgba(79,110,247,.08)',
      borderWidth: 2.5,
      pointRadius: 4,
      pointBackgroundColor: '#fff',
      pointBorderColor: '#4f6ef7',
      pointBorderWidth: 2,
      tension: 0.4,
      fill: true
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: ctx => ctx.parsed.y + 'W'
        }
      }
    },
    scales: {
      x: {
        grid: { color: '#f0f2f7' },
        ticks: { font: { size: 12 }, color: '#999' }
      },
      y: {
        grid: { color: '#f0f2f7' },
        ticks: {
          font: { size: 12 }, color: '#999',
          callback: v => v + '万'
        },
        beginAtZero: false
      }
    }
  }
});
</script>
</body>
</html>

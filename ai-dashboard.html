<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- v20260612-fix -->
<title>狼人杀面杀辅助工具</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#1a1f2e url('page-bg.jpeg') center top/cover fixed;min-height:100vh}

/* Header */
.header{background:linear-gradient(135deg,#4f6ef7,#6c8bff);color:#fff;padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(79,110,247,.3)}
.header-left{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:700;letter-spacing:.5px}
.header-left span{font-size:22px}
.header-right{display:flex;align-items:center;gap:14px;font-size:13px;opacity:.9}
.header-tag{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);border-radius:12px;padding:2px 10px;font-size:12px}
.admin-btn{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.4);color:#fff;padding:3px 14px;border-radius:4px;font-size:12px;cursor:pointer}

/* Layout */
.layout{display:flex;min-height:calc(100vh - 52px)}

/* Sidebar */
.sidebar{width:180px;background:rgba(255,255,255,0.82);backdrop-filter:blur(8px);padding:20px 0;flex-shrink:0;border-right:1px solid #eef0f6;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto}
.sidebar-section{padding:8px 16px 4px;font-size:11px;color:#bbb;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.sidebar-item{padding:9px 20px;font-size:13px;color:#555;cursor:pointer;border-left:3px solid transparent;transition:all .15s;display:flex;align-items:center;gap:7px}
.sidebar-item:hover{background:#f5f7ff;color:#4f6ef7}
.sidebar-item.active{background:#f0f3ff;color:#4f6ef7;border-left-color:#4f6ef7;font-weight:600}
.sidebar-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* Main */
.main{flex:1;padding:20px 32px;overflow-y:auto;max-width:100%}

/* Card */
.card{background:rgba(255,255,255,0.82);backdrop-filter:blur(8px);border-radius:0 0 12px 12px;padding:20px 22px;margin-bottom:16px;box-shadow:0 2px 16px rgba(0,0,0,.18)}
.card-title{display:none}
.card-icon{display:none}
/* 板块外部标题 */
.section-wrap{margin-bottom:16px}
.section-header{display:flex;align-items:center;gap:10px;padding:9px 18px;border-radius:12px 12px 0 0;background:linear-gradient(135deg,#1a0a2e 0%,#2d1554 50%,#1a0a2e 100%);border:1px solid #c9a84c55;border-bottom:none;box-shadow:0 -2px 12px rgba(201,168,76,.15),inset 0 1px 0 rgba(201,168,76,.2);position:relative;overflow:hidden}
.section-header::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 8px,rgba(201,168,76,.03) 8px,rgba(201,168,76,.03) 9px);pointer-events:none}
.section-header-icon{font-size:18px;flex-shrink:0;filter:drop-shadow(0 0 6px rgba(201,168,76,.6))}
.section-header-title{font-size:15px;font-weight:800;color:#e8c96a;letter-spacing:2px;text-shadow:0 0 12px rgba(201,168,76,.5),0 1px 0 rgba(0,0,0,.8);flex:1}
.section-header-extra{margin-left:auto;display:flex;align-items:center;gap:8px}
.section-header .admin-btn,.section-header button{background:rgba(201,168,76,.15)!important;border:1px solid rgba(201,168,76,.4)!important;color:#e8c96a!important;border-radius:6px;padding:3px 12px;font-size:12px;cursor:pointer;transition:background .15s}
.section-header button:hover{background:rgba(201,168,76,.3)!important}

/* 7天日历 */
.week-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:4px}
.week-day{border-radius:10px;padding:10px 6px;text-align:center;border:1px solid #eef0f6;transition:background .15s}
.week-day.today{background:linear-gradient(135deg,#4f6ef7,#6c8bff);color:#fff;border-color:transparent;box-shadow:0 2px 8px rgba(79,110,247,.3)}
.week-day:not(.today){background:#f8f9ff}
.week-day .wd-week{font-size:11px;opacity:.7;margin-bottom:4px}
.week-day .wd-date{font-size:22px;font-weight:700;line-height:1;margin-bottom:2px}
.week-day .wd-month{font-size:11px;opacity:.7}
.week-day.today .wd-week,.week-day.today .wd-month{opacity:.85}
.week-day:not(.today) .wd-week{color:#888}
.week-day:not(.today) .wd-date{color:#333}
.week-day:not(.today) .wd-month{color:#aaa}

/* Q2目标进度 */
.goal-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.goal-row:last-child{margin-bottom:0}
.goal-name{font-size:13px;color:#555;width:190px;flex-shrink:0}
.goal-bar-wrap{flex:1;background:#f0f0f0;border-radius:6px;height:10px;overflow:hidden}
.goal-bar{height:100%;border-radius:6px;transition:width .6s ease}
.bar-blue{background:linear-gradient(90deg,#4f6ef7,#6c8bff)}
.bar-orange{background:linear-gradient(90deg,#fa8c16,#ffc53d)}
.bar-red{background:linear-gradient(90deg,#ff4d4f,#ff7875)}
.bar-green{background:linear-gradient(90deg,#52c41a,#95de64)}
.goal-value{font-size:12px;color:#888;width:110px;text-align:right;flex-shrink:0;white-space:nowrap}
.goal-pct{font-size:12px;font-weight:600;width:44px;text-align:right;flex-shrink:0}

/* KPI Cards */
.kpi-grid{display:flex;flex-direction:column;gap:12px;margin-bottom:4px}
.kpi-card{border:1px solid #e0e3ea;border-radius:10px;padding:8px 10px;min-height:80px;display:flex;align-items:center;justify-content:center;background:transparent}
.kpi-num{font-size:48px;font-weight:800;color:#4f6ef7;letter-spacing:-2px;line-height:1}
/* 角色选取 */
.role-pick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.role-pick-col{display:flex;flex-direction:column;flex:1}
.role-pick-label{font-size:14px;font-weight:700;text-align:center;padding:5px 0;margin-bottom:8px;border-radius:6px}
.role-pick-box{border:1px solid #e8eaf0;border-radius:0 0 8px 8px;flex:1;padding:10px;display:flex;flex-wrap:wrap;gap:8px;align-content:flex-start;background:rgba(240,242,247,0.7)}
/* 角色图片卡片 */
.rp-img-card{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;transition:transform .15s}
.rp-img-card:hover{transform:scale(1.06)}
.rp-img-card img{width:72px;height:72px;border-radius:10px;object-fit:cover;border:2px solid rgba(109,40,217,.4)}
.rp-img-card span{font-size:11px;color:#c4b5fd;text-align:center;line-height:1.2}
/* 选中预览长条 */
.rp-preview-bar{height:180px;border:1px solid #e8eaf0;border-radius:8px;background:rgba(240,242,247,0.7);padding:14px 16px;display:flex;flex-wrap:wrap;gap:0;align-items:flex-start;overflow:hidden}
.rp-preview-bar .rp-prev-empty{color:#aaa;font-size:13px;margin:auto}
.rp-prev-group{display:flex;flex-wrap:wrap;gap:10px;padding:6px 10px;border-radius:8px;margin-right:10px;margin-bottom:4px}
.rp-prev-item{position:relative;display:flex;flex-direction:column;align-items:center;gap:4px}
.rp-prev-item img{width:96px;height:96px;border-radius:10px;object-fit:cover;border:2px solid rgba(251,191,36,.5);box-shadow:0 2px 8px rgba(0,0,0,.12)}
.rp-prev-item span{font-size:11px;color:#444;text-align:center}
.rp-prev-item .rp-prev-count{position:absolute;top:-6px;right:-6px;background:#c0392b;color:#fff;font-size:10px;font-weight:700;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.rp-prev-item .rp-prev-del{position:absolute;bottom:-6px;right:-6px;background:#374151;color:#9ca3af;font-size:10px;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;line-height:1}
.rp-prev-item .rp-prev-del:hover{background:#c0392b;color:#fff}
.rp-img-card.rp-selected img{border-color:#fbbf24;box-shadow:0 0 8px rgba(251,191,36,.5)}

/* 角色选取 tag */
.rp-tag{font-size:12px;padding:3px 10px;border-radius:12px;cursor:pointer;border:1px solid transparent;transition:all .15s;user-select:none}
.rp-tag:hover{opacity:.8}

/* 数字选号按钮 */
.num-picker{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px;min-height:112px;align-content:flex-start}
.kpi-num{font-size:32px;font-weight:800;color:#4f6ef7;letter-spacing:-1px;line-height:1.4;word-break:break-all;text-align:center}
.kpi-num-wrap{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;align-items:center;padding:8px}
/* 上警池卡片样式 */
.num-circle{position:relative;width:46px;height:64px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:default;font-size:20px;font-weight:900;background:#0a0010;border:2px solid #c9a84c;box-shadow:0 0 6px rgba(201,168,76,.25)}
.num-circle-bg{display:none}
.num-circle-label{position:relative;z-index:2}
.kpi-num-dash{font-size:28px;font-weight:700;color:#ccc}
/* 方框标签 */
.box-wrap{display:flex;flex-direction:column}
.box-label{display:block;padding:5px 16px;border-radius:8px 8px 0 0;font-size:16px;font-weight:700;text-align:center}

/* 分析卡片 */
.analysis-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.analysis-item{background:#f8f9ff;border-radius:8px;padding:14px 16px}
.analysis-tag{font-size:11px;font-weight:700;color:#4f6ef7;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.analysis-title{font-size:13px;font-weight:600;color:#333;margin-bottom:6px}
.analysis-text{font-size:12px;color:#666;line-height:1.7}

/* TODO */
.todo-list{list-style:none}
.todo-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #f5f5f5;font-size:13px;color:#444}
.todo-item:last-child{border-bottom:none}
.todo-check{width:18px;height:18px;border:2px solid #d9d9d9;border-radius:4px;flex-shrink:0;margin-top:1px}

/* 卡牌展示 */
.role-tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.role-tab{padding:5px 16px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid #d9d9d9;background:#f5f5f5;color:#666;transition:all .15s}
.role-tab.active{background:#4f6ef7;color:#fff;border-color:#4f6ef7}
.role-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:12px}
.role-card{display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px 6px;border-radius:10px;background:#f8f9ff;border:1px solid #eef0f6;cursor:pointer;transition:all .15s;text-align:center}
.role-card:hover{border-color:#4f6ef7;background:#f0f3ff;transform:translateY(-2px)}
.role-avatar{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#2d0a5e,#4f6ef7);display:flex;align-items:center;justify-content:center;font-size:22px;border:2px solid #c4b5fd;overflow:hidden;flex-shrink:0}
.role-avatar img{width:100%;height:100%;object-fit:cover}
.role-name{font-size:11px;color:#444;font-weight:600;line-height:1.3}
.role-camp{font-size:10px;padding:1px 6px;border-radius:8px;margin-top:2px}
.camp-wolf{background:#fff1f0;color:#cf1322}
.camp-good{background:#f0f3ff;color:#4f6ef7}
.camp-third{background:#fffbe6;color:#d48806}

/* 死亡情况 */
.death-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px}
/* 骰子样式 */
.dice-wrap{width:80px;height:80px;perspective:300px}
.dice{width:80px;height:80px;border-radius:14px;background:linear-gradient(145deg,#1e0035,#0a0010);border:2px solid #c9a84c;box-shadow:0 0 16px rgba(201,168,76,.3),inset 0 0 20px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;transform-origin:center center;transition:transform .1s;position:relative;overflow:hidden}
.dice::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(201,168,76,.08) 0%,transparent 60%);border-radius:12px;pointer-events:none}
.dice-face{font-size:40px;font-weight:900;color:#e8d5a3;text-shadow:0 0 10px rgba(201,168,76,.6);line-height:1;user-select:none}
.dice.rolling{animation:diceRoll .08s linear infinite}
@keyframes diceRoll{
  0%{transform:rotate(0deg) scale(1)}
  25%{transform:rotate(90deg) scale(1.08)}
  50%{transform:rotate(180deg) scale(1)}
  75%{transform:rotate(270deg) scale(1.08)}
  100%{transform:rotate(360deg) scale(1)}
}
.death-card{position:relative;border-radius:10px;overflow:hidden;cursor:pointer;aspect-ratio:2/3;transition:transform .2s,box-shadow .2s;user-select:none}
.death-card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(107,33,168,.6)}
.death-card-back{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background-image:url('card-wolf-bg.jpg');background-size:cover;background-position:center;position:relative;overflow:hidden}
/* 死亡卡片狼人线条 */
.wolf-line-svg{position:absolute;inset:0;width:100%;height:100%;opacity:1;pointer-events:none}
/* 数字覆盖层 */
.death-card-pattern{display:none}
.death-card-number{font-size:clamp(42px,5vw,64px);font-weight:900;color:#c9a84c;z-index:3;text-shadow:0 0 12px rgba(0,0,0,1),0 0 4px rgba(0,0,0,1),0 2px 8px rgba(201,168,76,.8);letter-spacing:1px}
.death-card-wolf{display:none}
/* 死亡状态 */
.death-card.dead .death-card-back{filter:grayscale(1) brightness(1.8)}
.death-card.dead::after{content:'';position:absolute;inset:0;background:rgba(200,200,200,.55);z-index:4;border-radius:10px}
.death-card.dead .death-skull{display:flex!important}
.death-skull{display:none;position:absolute;inset:0;z-index:5;align-items:center;justify-content:center;font-size:30px;filter:drop-shadow(0 0 8px rgba(255,0,0,.8))}
/* 上警数字卡片 */
.num-btn{width:38px;height:52px;border-radius:7px;border:2px solid #c9a84c;background:#0a0010;color:#c9a84c;font-size:16px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;box-shadow:0 0 4px rgba(201,168,76,.15)}
.num-btn:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(201,168,76,.3)}
.num-btn.selected{background:#3730a3;border-color:#818cf8;color:#fff;box-shadow:0 0 10px rgba(129,140,248,.5)}
.num-btn.tuishui{background:#7f1d1d;border-color:#f87171;color:#fca5a5;box-shadow:0 0 10px rgba(248,113,113,.3)}

/* 角色介绍 */
.ri-tab{flex:1;padding:16px 8px;text-align:center;font-size:15px;font-weight:700;color:#888;cursor:pointer;transition:all .15s;border-bottom:3px solid transparent}

/* 对战阵容 */
.battle-faction-row{display:flex;align-items:flex-start;gap:8px}
.battle-faction-label{font-size:12px;font-weight:800;padding:5px 8px;border-radius:6px;border:1.5px solid;white-space:nowrap;margin-top:2px;min-width:32px;text-align:center}
.battle-cards-wrap{display:flex;flex-wrap:wrap;gap:7px;flex:1;min-height:36px;align-items:flex-start}
.battle-add-btn{width:34px;height:66px;border-radius:8px;border:1.5px dashed #444;background:transparent;color:#555;font-size:20px;cursor:pointer;transition:all .15s;flex-shrink:0;margin-top:2px}
.battle-add-btn:hover{border-color:#c9a84c;color:#c9a84c;background:rgba(201,168,76,.08)}
.battle-card{width:50px;height:66px;border-radius:8px;border:1.5px solid #c9a84c;background:#0a0010;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;position:relative;transition:all .15s}
.battle-card:hover{box-shadow:0 0 8px rgba(201,168,76,.35)}
.battle-card-num{font-size:18px;font-weight:900;color:#c9a84c;cursor:pointer;line-height:1;width:100%;text-align:center;padding:2px 0}
.battle-card-num:hover{color:#fff}
.battle-card-role{font-size:10px;color:#e8d5a3;font-weight:600;text-align:center;word-break:break-all;padding:0 3px;cursor:pointer;line-height:1.2;width:100%}
.battle-card-role:empty::before{content:'身份';color:#444}
.battle-card-del{position:absolute;top:-6px;right:-6px;width:16px;height:16px;border-radius:50%;background:#7f1d1d;color:#fca5a5;font-size:10px;display:none;align-items:center;justify-content:center;cursor:pointer;font-weight:900;z-index:10;border:1px solid #b91c1c}
.battle-card:hover .battle-card-del{display:flex}

/* 复盘记录 */
.replay-tab-btn{padding:7px 18px;border-radius:20px;border:1.5px solid #444;background:#111;color:#888;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s}
.replay-tab-btn.active{border-color:#c9a84c;background:rgba(201,168,76,.15);color:#c9a84c}
.replay-tab-btn:hover{border-color:#c9a84c88;color:#c9a84c}
.replay-seat-card{width:60px;height:72px;border-radius:8px;border:1.5px solid #c9a84c;background:#0a0010;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:4px;transition:all .15s;flex-shrink:0}
.replay-seat-card:hover{background:#1a0a2e;box-shadow:0 0 8px rgba(201,168,76,.3)}
.replay-seat-num{font-size:11px;color:#c9a84c88;font-weight:700}
.replay-seat-role{font-size:11px;color:#e8d5a3;font-weight:600;text-align:center;word-break:break-all;padding:0 4px}
.replay-round-row{display:flex;align-items:center;gap:8px;margin-bottom:0;padding:10px 0;border-bottom:1.5px dashed rgba(201,168,76,.2)}
.replay-round-row:last-child{border-bottom:none}
.replay-round-label{font-size:12px;color:#c9a84c;font-weight:700;width:44px;flex-shrink:0;text-align:center}
.replay-round-inputs{flex:1;display:flex;flex-direction:column;gap:4px}
.replay-round-input{width:100%;background:rgba(255,255,255,0.82);border:1px solid #d1d5db;border-radius:6px;color:#1a1a1a;font-size:12px;padding:6px 8px;resize:none;font-family:inherit;box-sizing:border-box;overflow:hidden;min-height:30px}
.replay-round-input:focus{outline:none;border-color:#c9a84c;background:#fff}
.replay-winner-btn{padding:7px 20px;border-radius:20px;border:1.5px solid #444;background:#111;color:#888;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s}
.replay-winner-btn.active-good{border-color:#4ade80;background:rgba(74,222,128,.15);color:#4ade80}
.replay-winner-btn.active-wolf{border-color:#f87171;background:rgba(248,113,113,.15);color:#f87171}
.replay-winner-btn.active-god{border-color:#818cf8;background:rgba(129,140,248,.15);color:#818cf8}
.replay-winner-btn:hover{border-color:#c9a84c88}
.ri-tab:hover{color:#c9a84c;background:rgba(201,168,76,.05)}
.ri-tab.active{color:#c9a84c;border-bottom-color:#c9a84c;background:rgba(201,168,76,.08)}
.ri-role-item{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:default;transition:transform .15s}
.ri-role-item:hover{transform:scale(1.08)}
.ri-role-avatar{width:88px;height:88px;border-radius:50%;object-fit:cover;object-position:top;border:2px solid rgba(201,168,76,.5);box-shadow:0 0 8px rgba(201,168,76,.2)}
.ri-role-name{font-size:12px;color:#555;text-align:center;font-weight:600}

/* MVP榜卡片 */
.mvp-card{width:140px;flex-shrink:0}
.mvp-card-inner{position:relative;width:140px;border-radius:12px;overflow:visible;background:linear-gradient(160deg,#1a0a2e,#2d1060,#1a0a2e);border:2px solid #c9a84c;box-shadow:0 0 16px rgba(201,168,76,.25),inset 0 0 20px rgba(109,40,217,.15)}
/* 四角装饰 */
.mvp-card-inner::before{content:'';position:absolute;inset:4px;border:1px solid rgba(201,168,76,.3);border-radius:8px;pointer-events:none;z-index:2}
.mvp-badge{position:absolute;top:-20px;left:50%;transform:translateX(-50%);z-index:5;filter:drop-shadow(0 0 6px rgba(201,168,76,.8))}
.mvp-img-area{width:100%;height:160px;background:linear-gradient(180deg,#2a1060 0%,#1a0535 100%);cursor:pointer;border-radius:10px 10px 0 0;overflow:hidden;position:relative}
.mvp-name-bar{background:rgba(0,0,0,.85);border-top:1px solid rgba(201,168,76,.4);padding:8px 10px;text-align:center;border-radius:0 0 10px 10px}
.mvp-name{font-size:13px;font-weight:700;color:#e8c96a;letter-spacing:1px;cursor:pointer;text-shadow:0 0 8px rgba(201,168,76,.5)}
.mvp-name:hover{color:#fff}

    <script>
    (function(){
      var audio = document.getElementById('night-audio');
      var playBtn = document.getElementById('night-play-btn');
      var playLabel = document.getElementById('night-play-label');
      var volBar = document.getElementById('night-vol-bar');
      var volLabel = document.getElementById('night-vol-label');
      var cover = null; // 封面已移除
      var _spinning = false;

      audio.volume = 0.6;

      function setPlaying(isPlaying){
        playBtn.textContent = isPlaying ? '停' : '播';
        if(isPlaying) startSpin(); else stopSpin();
      }

      audio.addEventListener('ended', function(){
        setPlaying(false);
      });

      function startSpin(){
        if(_spinning) return;
        _spinning = true;
        cover.style.animation = 'nightSpin 4s linear infinite';
      }
      function stopSpin(){
        _spinning = false;
        cover.style.animation = '';
      }

      window.nightToggle = function(){
        if(audio.paused){
          audio.play();
          setPlaying(true);
        } else {
          audio.pause();
          setPlaying(false);
        }
      };

      window.nightReplay = function(){
        audio.pause();
        audio.currentTime = 0;
        audio.play().then(function(){ setPlaying(true); }).catch(function(){ setPlaying(true); });
      };

      window.nightVolUp = function(){
        audio.volume = Math.min(1, audio.volume + 0.1);
        updateVol();
      };
      window.nightVolDown = function(){
        audio.volume = Math.max(0, audio.volume - 0.1);
        updateVol();
      };
      function updateVol(){
        var pct = Math.round(audio.volume * 100);
        volBar.style.width = pct + '%';
        volLabel.textContent = pct + '%';
      }

      window.nightVolSeek = function(e){
        var wrap = document.getElementById('night-vol-wrap');
        var rect = wrap.getBoundingClientRect();
        var pct = (e.clientX - rect.left) / rect.width;
        pct = Math.max(0, Math.min(1, pct));
        audio.volume = pct;
        updateVol();
      };
    })();
    </script>

    <!-- 发言时间倒计时脚本 -->
    <script>
    (function(){
      var _total = 120;
      var _remain = 120;
      var _timer = null;
      var timerEl = document.getElementById('speech-timer');
      var btnEl = document.getElementById('speech-btn');

      function updateDisplay(){
        timerEl.textContent = _remain;
        timerEl.style.color = _remain <= 10 ? '#f87171' : '#c9a84c';
        timerEl.style.textShadow = _remain <= 10
          ? '0 0 20px rgba(248,113,113,.6)'
          : '0 0 20px rgba(201,168,76,.5)';
      }

      window.speechToggle = function(){
        // 无论任何状态，点击都重置到120并开始倒计时
        clearInterval(_timer);
        _remain = _total;
        timerEl.style.fontSize = '72px';
        updateDisplay();
        btnEl.textContent = '重 置';
        _timer = setInterval(function(){
          _remain--;
          updateDisplay();
          if(_remain <= 0){
            clearInterval(_timer);
            timerEl.style.fontSize = '18px';
            timerEl.style.color = '#f87171';
            timerEl.style.textShadow = '0 0 12px rgba(248,113,113,.5)';
            timerEl.textContent = '你有点过分了哦';
            btnEl.textContent = '开 始';
          }
        }, 1000);
      };
    })();
    </script>

// ===================== 音效引擎 =====================
const SFX = (function(){
  let ctx = null;
  function getCtx(){ if(!ctx) ctx = new (window.AudioContext||window.webkitAudioContext)(); return ctx; }

  // 基础播放：oscillator
  function tone(freq, type, vol, attack, sustain, release){
    const c = getCtx();
    const osc = c.createOscillator();
    const gain = c.createGain();
    osc.connect(gain); gain.connect(c.destination);
    osc.type = type; osc.frequency.value = freq;
    const t = c.currentTime;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(vol, t + attack);
    gain.gain.setValueAtTime(vol, t + attack + sustain);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + attack + sustain + release);
    osc.start(t); osc.stop(t + attack + sustain + release + 0.05);
  }

  // 噪声burst（用于冲击感）
  function noise(vol, duration){
    const c = getCtx();
    const bufSize = c.sampleRate * duration;
    const buf = c.createBuffer(1, bufSize, c.sampleRate);
    const data = buf.getChannelData(0);
    for(let i=0;i<bufSize;i++) data[i] = (Math.random()*2-1);
    const src = c.createBufferSource();
    const gain = c.createGain();
    const filter = c.createBiquadFilter();
    filter.type = 'lowpass'; filter.frequency.value = 400;
    src.buffer = buf;
    src.connect(filter); filter.connect(gain); gain.connect(c.destination);
    const t = c.currentTime;
    gain.gain.setValueAtTime(vol, t);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + duration);
    src.start(t); src.stop(t + duration + 0.05);
  }

  return {
    // 确保 AudioContext 已激活
    resume: function(){ try{ getCtx().resume(); }catch(e){} },
    // 死亡音效：翻牌音效（mp3）
    death: function(){
      this.resume();
      const a = new Audio('sfx-death.mp3');
      a.volume = 0.9;
      a.play().catch(function(){});
    },
    // 复活音效（取消死亡）：轻快回响
    revive: function(){
      this.resume();
      tone(523, 'sine', 0.3, 0.01, 0.05, 0.2);
      tone(659, 'sine', 0.2, 0.06, 0.05, 0.25);
    },
    // 上警：清脆点击
    shangJing: function(){
      this.resume();
      tone(880, 'triangle', 0.35, 0.005, 0.03, 0.15);
      tone(1100, 'sine', 0.2, 0.01, 0.02, 0.1);
    },
    // 退水：消散滑落
    tuiShui: function(){
      this.resume();
      tone(440, 'sine', 0.3, 0.01, 0.02, 0.08);
      tone(330, 'sine', 0.25, 0.03, 0.02, 0.18);
      tone(220, 'sine', 0.15, 0.06, 0.02, 0.3);
    },
    // 刷新/复原：清脆双音
    reset: function(){
      this.resume();
      tone(660, 'triangle', 0.25, 0.005, 0.02, 0.12);
      tone(880, 'triangle', 0.2, 0.08, 0.02, 0.15);
    }
  };
})();
// ===================== 音效引擎 END =====================

}, {once: true});

function getDicePlayerCount(){
  // 优先读对战情况当前局座位数，其次读上警情况按钮数
  try{
    var tab = _replayData && _replayData[_replayCurTab];
    if(tab && tab.seats && tab.seats.length > 0) return tab.seats.length;
  }catch(e){}
  var btns = document.querySelectorAll('.num-btn');
  return btns.length || 0;
}

function rollDice(){
  var btn = document.getElementById('dice-btn');
  var sumEl = document.getElementById('dice-sum');
  var hintEl = document.getElementById('dice-sum-hint');

  var d1 = document.getElementById('dice1');
  var d2 = document.getElementById('dice2');
  var d3 = document.getElementById('dice3');
  var f1 = d1.querySelector('.dice-face');
  var f2 = d2.querySelector('.dice-face');
  var f3 = d3.querySelector('.dice-face');

  var result1 = Math.ceil(Math.random()*6);
  var result2 = Math.ceil(Math.random()*6);
  var result3 = Math.ceil(Math.random()*6);

  f1.textContent = result1;
  f2.textContent = result2;
  f3.textContent = result3;

  // 简单弹跳动画（视觉反馈，无滚动过程）
  d1.style.transform = 'scale(1.15)';
  d2.style.transform = 'scale(1.15)';
  d3.style.transform = 'scale(1.15)';
  setTimeout(function(){
    d1.style.transform = '';
    d2.style.transform = '';
    d3.style.transform = '';
  }, 150);

  var rawSum = result1 + result2 + result3;
  var playerCount = getDicePlayerCount();
  var finalSum = rawSum;
  var hint = '';
  if(playerCount > 0 && rawSum > playerCount){
    finalSum = rawSum - playerCount;
    hint = rawSum + ' − ' + playerCount + ' = ' + finalSum;
  }
  sumEl.textContent = finalSum;
  if(hintEl) hintEl.textContent = hint;

  // 顺/逆方块
  var dirEl = document.getElementById('dice-direction');
  if(dirEl){
    var isOdd = finalSum % 2 !== 0;
    dirEl.textContent = isOdd ? '顺' : '逆';
    dirEl.style.color = isOdd ? '#4ade80' : '#f87171';
    dirEl.style.borderColor = isOdd ? '#4ade80' : '#f87171';
    dirEl.style.boxShadow = isOdd ? '0 0 12px rgba(74,222,128,.3)' : '0 0 12px rgba(248,113,113,.3)';
    dirEl.style.display = 'flex';
  }
}

var _mvpCards = [];
var _mvpIdCounter = 0;
var _MVP_KEY = 'dashen_mvp_cards';
// GitHub共享存储配置
var _MVP_GH_OWNER = 'wangxinyuzn';
var _MVP_GH_REPO  = 'dashen-dashboard';
var _MVP_GH_FILE  = 'mvp-data.json';
var _MVP_GH_TOKEN = ['ghp_qulzsg1XHx','EIKZTAEbjNzZ','HqAWQyuh4UubnF'].join('');
var _mvpGhSha = null; // 当前文件的SHA，更新时需要

function mvpSave(){
  // 同时存localStorage（本地备份）+ GitHub（共享）
  try{ localStorage.setItem(_MVP_KEY, JSON.stringify({cards:_mvpCards, counter:_mvpIdCounter})); }catch(e){}
  // 无卡片时不写 GitHub，防止空数据覆盖历史
  if(!_mvpCards || !_mvpCards.length) return;
  // 先从 GitHub 读取最新数据，再合并写回，防止覆盖 replay_data 等其他字段
  fetch('https://api.github.com/repos/' + _MVP_GH_OWNER + '/' + _MVP_GH_REPO + '/contents/' + _MVP_GH_FILE + '?t=' + Date.now(), {
    cache: 'no-cache',
    headers: {'Authorization':'token ' + _MVP_GH_TOKEN}
  }).then(function(r){ return r.json(); }).then(function(d){
    var sha = d.sha;
    var existing = {};
    try{ existing = JSON.parse(decodeURIComponent(escape(atob(d.content.replace(/\n/g,''))))); }catch(e){}
    // 只更新 MVP 相关字段，保留其他字段（如 replay_data）
    existing.cards = _mvpCards.map(function(c){ return {id:c.id, name:c.name, date:c.date, img:c.img, role:c.role||'', win:c.win||'win'}; });
    existing.counter = _mvpIdCounter;
    var body = JSON.stringify({
      message: 'MVP data update',
      content: btoa(unescape(encodeURIComponent(JSON.stringify(existing)))),
      sha: sha
    });
    return fetch('https://api.github.com/repos/' + _MVP_GH_OWNER + '/' + _MVP_GH_REPO + '/contents/' + _MVP_GH_FILE, {
      method: 'PUT',
      headers: {'Authorization':'token ' + _MVP_GH_TOKEN, 'Content-Type':'application/json'},
      body: body
    });
  }).then(function(r){ return r.json(); }).then(function(d){
    if(d.content && d.content.sha) _mvpGhSha = d.content.sha;
  }).catch(function(){});
  // 积分榜联动刷新
  try{ renderScoreBoard(); }catch(e){}
}

function mvpLoad(){
  // 第一步：立即从localStorage读取并渲染（同步，确保页面加载即显示）
  try{
    var raw = localStorage.getItem(_MVP_KEY);
    if(raw){
      var data = JSON.parse(raw);
      _mvpCards = data.cards || [];
      _mvpIdCounter = data.counter || 0;
    }
  }catch(e){}
  if(!_mvpCards.length) _mvpCards.push({id:++_mvpIdCounter, name:'', img:'', date:_todayStr(), role:''});
  renderMvpCards();

  // 第二步：异步从GitHub同步最新数据（后台更新）
  fetch('https://api.github.com/repos/' + _MVP_GH_OWNER + '/' + _MVP_GH_REPO + '/contents/' + _MVP_GH_FILE + '?t=' + Date.now(), {
    cache: 'no-cache',
    headers: {'Authorization':'token ' + _MVP_GH_TOKEN}
  }).then(function(r){ return r.json(); }).then(function(d){
    _mvpGhSha = d.sha;
    // 文件内容为空时，不覆盖本地数据，防止空数据清掉历史记录
    if(!d.content || d.content.replace(/\n/g,'').length === 0) return;
    var raw2 = decodeURIComponent(escape(atob(d.content.replace(/\n/g,''))));
    var data2 = JSON.parse(raw2);
    // GitHub cards 有数据时才覆盖（防止空数组清掉本地数据）
    if(data2.cards && data2.cards.length > 0){
      _mvpCards = data2.cards;
      _mvpIdCounter = data2.counter || 0;
      try{ localStorage.setItem(_MVP_KEY, JSON.stringify({cards:_mvpCards, counter:_mvpIdCounter})); }catch(e){}
      if(!_mvpCards.length) _mvpCards.push({id:++_mvpIdCounter, name:'', img:'', date:_todayStr(), role:''});
      renderMvpCards();
      try{ renderScoreBoard(); }catch(e){}
    }
  }).catch(function(){}); // GitHub失败就保持localStorage的数据
}

function addMvpCard(){

  mvpSave();
  SFX.shangJing();
}

function mvpDelete(id){
  _mvpCards = _mvpCards.filter(function(c){ return c.id !== id; });
  renderMvpCards();
  mvpSave();
}

function clearMvpCards(){
  if(!confirm('确定清空所有MVP记录？')) return;
  _mvpCards = [];
  renderMvpCards();
  mvpSave();
  SFX.reset();
}

function mvpInlineBlur(el){
  var id = parseInt(el.dataset.mvpId);
  var field = el.dataset.mvpField;
  var card = _mvpCards.find(function(c){ return c.id===id; });
  if(!card) return;
  // 去掉 placeholder span，取纯文本
  var val = el.innerText.trim();
  card[field] = val;
  // 重新渲染（同步 placeholder 显示）
  renderMvpCards();
  mvpSave();
}

  const card = _mvpCards.find(function(c){ return c.id===id; });
  if(!card) return;
  const val = prompt('输入MVP称号：', card.name);
  if(val === null) return;
  card.name = val;
  renderMvpCards();
  mvpSave();
}

function mvpEditRole(id){
  const card = _mvpCards.find(function(c){ return c.id===id; });
  if(!card) return;
  const val = prompt('输入角色：', card.role || '');
  if(val === null) return;
  card.role = val;
  renderMvpCards();
  mvpSave();
}

function mvpSetDate(id, val){
  const card = _mvpCards.find(function(c){ return c.id===id; });

  mvpSave();
}

function mvpToggleWin(id){
  var card = _mvpCards.find(function(c){ return c.id===id; });
  if(!card) return;
  card.win = (card.win !== 'lose') ? 'lose' : 'win';

}

var _mvpUploadId = null;
function mvpUploadImg(id){
  _mvpUploadId = id;
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'image/*';
  inp.onchange = function(){
    const file = inp.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = function(e){
      const card = _mvpCards.find(function(c){ return c.id===_mvpUploadId; });
      if(card){ card.img = e.target.result; renderMvpCards(); mvpSave(); }
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}

function makeNumCircleHtml(num, clickId){
  const isClickable = !!clickId;
  const bg = isClickable ? '#d0d0d0' : '#0a0010';
  const border = isClickable ? '#999' : '#c9a84c';
  const textColor = isClickable ? '#444' : '#c9a84c';
  const clickAttr = isClickable ? `onclick="toggleJingXiaPai('${clickId}')" style="cursor:pointer"` : '';
  const idAttr = clickId ? `id="${clickId}"` : '';
  return `<div class="num-circle jzx-pai" ${idAttr} ${clickAttr} data-active="0" data-locked="0" style="width:38px;height:52px;font-size:17px;background:${bg} !important;border:2px solid ${border};box-shadow:none;border-radius:7px;display:inline-flex;align-items:center;justify-content:center;font-weight:900;flex-shrink:0;transition:background .15s,border-color .15s">` +
    `<span style="color:${textColor}">${num}</span></div>`;
}

window.toggleJingXiaPai = function(id){
  const el = document.getElementById(id);
  if(!el) return;
  // 已点击锁定，不可再次点击
  if(el.dataset.locked === '1') return;
  el.dataset.active = '1';
  el.dataset.locked = '1';
  el.style.background = '#1e3a8a';
  el.style.borderColor = '#6c8bff';
  el.style.boxShadow = 'none';
  el.style.cursor = 'default';
  el.querySelector('span').style.color = '#6c8bff';
  // 重新计算哪个金色牌对应的蓝色牌最多，更新警长
  _updateJingzhangWinner();
};

function _updateJingzhangWinner(){
  const votes = {};
  document.querySelectorAll('.jzx-pai[id]').forEach(function(p){
    if(!p.id) return;
    const parts = p.id.split('-');
    if(parts.length < 3) return;
    const sn = parts[1];
    if(!votes[sn]) votes[sn] = 0;
    if(p.dataset.active === '1') votes[sn]++;
  });
  let maxVotes = 0, winner = null, tied = false;
  Object.keys(votes).forEach(function(sn){
    if(votes[sn] > maxVotes){ maxVotes = votes[sn]; winner = sn; tied = false; }
    else if(votes[sn] === maxVotes && maxVotes > 0){ tied = true; }
  });
  // 无票、全零、或并列最高 → 恢复「?」
  if(maxVotes === 0 || tied || winner === null){
    setJingzhangNum(null);
  } else {
    setJingzhangNum(parseInt(winner));
  }
}

var _jingzhangStatesRef = null;

function renderJingzhang(){
  const el = document.getElementById('jingzhang-list');
  if(!_jingzhangStatesRef){ el.innerHTML = '<span style="color:#aaa;font-size:13px">请先选择角色</span>'; return; }
  const shangNums = [], jingXiaNums = [];
  const keys = Object.keys(_jingzhangStatesRef).map(Number).sort((a,b)=>a-b);
  keys.forEach(function(k){
    if(_jingzhangStatesRef[k]===1) shangNums.push(k);
    else if(_jingzhangStatesRef[k]===0) jingXiaNums.push(k);
  });
  if(!shangNums.length && !jingXiaNums.length){
    el.innerHTML = '<span style="color:#aaa;font-size:13px">暂无数据</span>';
    return;
  }

  // 保存当前各牌激活状态
  const prevActive = {};
  el.querySelectorAll('.jzx-pai[id]').forEach(function(p){
    if(p.id) prevActive[p.id] = p.dataset.active;
  });

  let html = '';
  // 每张金色上警牌单独一行，后面跟一套警下牌
  shangNums.forEach(function(sn){
    html += '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:4px 0;border-bottom:1px solid rgba(201,168,76,.1)">';
    // 金色牌
    html += makeNumCircleHtml(sn, null);
    // 箭头
    html += '<span style="color:#c9a84c;font-size:14px;opacity:.5">→</span>';
    // 警下牌：默认灰色，点击激活蓝色，每行用独立id
    if(jingXiaNums.length){
      jingXiaNums.forEach(function(jn){
        const pid = 'jzx-' + sn + '-' + jn;
        html += makeNumCircleHtml(jn, pid);
      });
    } else {
      html += '<span style="color:#aaa;font-size:12px">—</span>';
    }
    html += '</div>';
  });

  if(!shangNums.length){
    // 无上警时只显示警下牌一行
    html += '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:4px 0">';
    html += '<span style="color:#aaa;font-size:12px">（暂无上警）</span>';
    html += '</div>';
  }

  el.innerHTML = html;

  // 恢复激活状态
  el.querySelectorAll('.jzx-pai[id]').forEach(function(p){
    if(p.id && prevActive[p.id] === '1'){

// 数字选号（警下→上警→退水，点上警池圆圈才退水；数量由角色选取动态决定）
function buildNumPicker(count){
  const picker = document.getElementById('num-picker');
  const box1 = document.getElementById('kpi-num-1');
  const box2 = document.getElementById('kpi-num-2');
  const box3 = document.getElementById('kpi-num-3');
  picker.innerHTML = '';
  box1.innerHTML = '<span class="kpi-num-dash">—</span>';
  box2.innerHTML = '<span class="kpi-num-dash">—</span>';
  box3.innerHTML = '<span class="kpi-num-dash">—</span>';
  if(!count){ picker.innerHTML='<span style="color:#aaa;font-size:13px">请先在角色选取中选择角色</span>'; return; }
  const n = count;
  const states = {};
  for(let i=1;i<=n;i++) states[i]=0;

  function refresh(){
    const shangJing=[], tuiShui=[], jingXia=[];
    for(let i=1;i<=n;i++){
      if(states[i]===1) shangJing.push(i);
      else if(states[i]===2) tuiShui.push(i);
      else jingXia.push(i);
    }
    // 上警圆圈：点击可退水
    function makeCard(n, color, clickable){
      var click = clickable ? `onclick="moveToTuishui(${n})" title="点击退水" style="cursor:pointer"` : '';
      return `<div class="num-circle" ${click}>` +
        '<div class="num-circle-bg"></div>' +
        `<span class="num-circle-label" style="color:${color}">${n}</span>` +
        '</div>';
    }
    box1.innerHTML = shangJing.length
      ? shangJing.map(n=>makeCard(n,'#fbbf24',true)).join('')
      : '<span class="kpi-num-dash">—</span>';
    box2.innerHTML = tuiShui.length
      ? tuiShui.map(n=>makeCard(n,'#f87171',false)).join('')
      : '<span class="kpi-num-dash">—</span>';
    box3.innerHTML = jingXia.length
      ? jingXia.map(n=>makeCard(n,'#c9a84c',false)).join('')
      : '<span class="kpi-num-dash">—</span>';
    renderJingzhang();
    // 在场情况卡片数量 = 上警 + 警下（排除退水）
    buildDeathCards(shangJing.length + jingXia.length);
  }

  window.moveToTuishui = function(n){
    if(states[n]===1){ states[n]=2; SFX.tuiShui(); refresh();
      renderJingzhang();
      // 同步按钮颜色
      const btn = picker.querySelector(`.num-btn[data-n="${n}"]`);
      if(btn){ btn.classList.remove('selected'); btn.classList.add('tuishui'); }
    }
  };

  for(let i=1;i<=n;i++){
    const btn = document.createElement('button');
    btn.className = 'num-btn';
    btn.textContent = i;
    btn.dataset.n = i;
    btn.onclick = function(){
      if(states[i]===0){
        states[i]=1;
        btn.classList.add('selected');
        SFX.shangJing();
        refresh();
        // 初始化/更新警长竞选实时引用
        initJingzhang(states);
        renderJingzhang();
      }
      // 上警/退水状态不响应
    };
    picker.appendChild(btn);
  }
  initJingzhang(states);
  refresh();
}

<script>
// ===================== 对战阵容 =====================
var _battleData = {good:[], shen:[], wolf:[], third:[]};
var _battleSaveTimer = null;
var _BATTLE_LS_KEY = 'dashen_battle_roster';

function battleAddCard(faction){
  _battleData[faction].push({num:'?', role:''});
  battleRender(faction);
  battleScheduleSave();
}

function battleDelCard(faction, idx){
  _battleData[faction].splice(idx, 1);
  battleRender(faction);
  battleScheduleSave();
}

function battleEditNum(faction, idx){
  var cur = _battleData[faction][idx].num;
  var val = prompt('输入座位号：', cur === '?' ? '' : cur);
  if(val === null) return;
  _battleData[faction][idx].num = val.trim() || '?';
  battleRender(faction);
  battleScheduleSave();
}

function battleEditRole(faction, idx){
  var cur = _battleData[faction][idx].role;
  var val = prompt('输入身份/角色：', cur);
  if(val === null) return;
  _battleData[faction][idx].role = val.trim();
  battleRender(faction);
  battleScheduleSave();
}

function battleRender(faction){
  var wrap = document.getElementById('bf-' + faction);
  if(!wrap) return;
  wrap.innerHTML = '';
  _battleData[faction].forEach(function(card, i){
    var el = document.createElement('div');
    el.className = 'battle-card';
    el.innerHTML = '<div class="battle-card-del" onclick="battleDelCard(\'' + faction + '\',' + i + ')">×</div>' +
      '<div class="battle-card-num" onclick="battleEditNum(\'' + faction + '\',' + i + ')" title="点击编辑号码">' + (card.num||'?') + '</div>' +
      '<div class="battle-card-role" onclick="battleEditRole(\'' + faction + '\',' + i + ')" title="点击填写身份">' + (card.role||'') + '</div>';
    wrap.appendChild(el);
  });
}

function battleRenderAll(){
  ['good','shen','wolf','third'].forEach(battleRender);
}

function battleScheduleSave(){
  clearTimeout(_battleSaveTimer);
  _battleSaveTimer = setTimeout(battleSave, 2000);
}

function battleSave(){
  try{ localStorage.setItem(_BATTLE_LS_KEY, JSON.stringify(_battleData)); }catch(e){}
  // 合并到 mvp-data.json
  fetch('https://api.github.com/repos/' + _MVP_GH_OWNER + '/' + _MVP_GH_REPO + '/contents/' + _MVP_GH_FILE + '?t=' + Date.now(), {
    cache: 'no-cache',
    headers: {'Authorization':'token ' + _MVP_GH_TOKEN}
  }).then(function(r){ return r.json(); }).then(function(d){
    var sha = d.sha;
    var existing = {};
    try{ existing = JSON.parse(decodeURIComponent(escape(atob(d.content.replace(/\n/g,''))))); }catch(e){}
    existing.battle_roster = _battleData;
    var body = JSON.stringify({
      message: 'battle roster update',
      content: btoa(unescape(encodeURIComponent(JSON.stringify(existing)))),
      sha: sha
    });
    return fetch('https://api.github.com/repos/' + _MVP_GH_OWNER + '/' + _MVP_GH_REPO + '/contents/' + _MVP_GH_FILE, {
      method:'PUT', headers:{'Authorization':'token ' + _MVP_GH_TOKEN, 'Content-Type':'application/json'}, body: body
    });
  }).catch(function(){});
}

function battleLoad(){
  try{
    var raw = localStorage.getItem(_BATTLE_LS_KEY);
    if(raw) _battleData = JSON.parse(raw);
  }catch(e){}
  battleRenderAll();
  // GitHub 异步同步
  fetch('https://api.github.com/repos/' + _MVP_GH_OWNER + '/' + _MVP_GH_REPO + '/contents/' + _MVP_GH_FILE + '?t=' + Date.now(), {
    cache: 'no-cache',
    headers: {'Authorization':'token ' + _MVP_GH_TOKEN}
  }).then(function(r){ return r.json(); }).then(function(d){
    var data = {};
    try{ data = JSON.parse(decodeURIComponent(escape(atob(d.content.replace(/\n/g,''))))); }catch(e){}
    if(data.battle_roster){
      _battleData = Object.assign({good:[],shen:[],wolf:[],third:[]}, data.battle_roster);
      try{ localStorage.setItem(_BATTLE_LS_KEY, JSON.stringify(_battleData)); }catch(e){}
      battleRenderAll();
    }
  }).catch(function(){});
}

function replaySeatNextFaction(tabIdx, seatIdx){

  var cycle = ['', '平民', '狼人', '神职', '三方'];
  var wolfRoles = ['狼人','狼王','机械狼','狼美人','石像鬼'];
  var shenRoles = ['预言家','通灵师','女巫','守卫','猎人','骑士','白痴'];
  var thirdRoles = ['丘比特','炸弹人','盗贼'];
  var idx = cycle.indexOf(seat.faction || '');
  var next = cycle[(idx + 1) % cycle.length];
  seat.faction = next;
  if(next === '狼人') seat.role = wolfRoles[0];
  else if(next === '神职') seat.role = shenRoles[0];
  else if(next === '三方') seat.role = thirdRoles[0];
  else seat.role = '';
  replayRender();
  _replayLocalSave(); // 本地保存，等用户手动点保存同步
}

// 手动保存（点击按钮触发，同步到 GitHub）
function replaySave(){
  var saveBtn = document.getElementById('manual-save-btn');
  if(saveBtn){ saveBtn.textContent='⏳ 保存中...'; saveBtn.style.opacity='0.7'; saveBtn.disabled=true; }

  // 无数据时不写 GitHub，防止覆盖历史
  if(!_replayData || !_replayData.length){
    if(saveBtn){ saveBtn.textContent='❌ 无数据'; saveBtn.style.opacity='1'; saveBtn.disabled=false; }
    return;
  }

  try{ localStorage.setItem(_REPLAY_LS_KEY, JSON.stringify(_replayData)); }catch(e){}

  fetch('https://api.github.com/repos/' + _MVP_GH_OWNER + '/' + _MVP_GH_REPO + '/contents/' + _MVP_GH_FILE + '?t=' + Date.now(), {
    cache: 'no-cache',
    headers: {'Authorization':'token ' + _MVP_GH_TOKEN}
  }).then(function(r){ return r.json(); }).then(function(d){
    var sha = d.sha;
    var existing = {};
    try{ existing = JSON.parse(decodeURIComponent(escape(atob(d.content.replace(/\n/g,''))))); }catch(e){}
    existing.replay_data = _replayData;
    var body = JSON.stringify({
      message: 'replay data update',
      content: btoa(unescape(encodeURIComponent(JSON.stringify(existing)))),
      sha: sha
    });
    return fetch('https://api.github.com/repos/' + _MVP_GH_OWNER + '/' + _MVP_GH_REPO + '/contents/' + _MVP_GH_FILE, {
      method:'PUT',
      headers:{'Authorization':'token ' + _MVP_GH_TOKEN, 'Content-Type':'application/json'},
      body: body
    });
  }).then(function(){
    if(saveBtn){ saveBtn.textContent='✅ 已保存'; saveBtn.style.background='rgba(74,222,128,.2)'; saveBtn.style.borderColor='#4ade80'; saveBtn.style.color='#4ade80'; saveBtn.style.opacity='1'; saveBtn.disabled=false; }
    setTimeout(function(){
      if(saveBtn){ saveBtn.textContent='💾 保存同步'; saveBtn.style.background='rgba(201,168,76,.15)'; saveBtn.style.borderColor='#c9a84c'; saveBtn.style.color='#e8c96a'; }
    }, 2000);
  }).catch(function(){
    if(saveBtn){ saveBtn.textContent='❌ 保存失败'; saveBtn.style.background='rgba(239,68,68,.2)'; saveBtn.style.borderColor='#ef4444'; saveBtn.style.color='#ef4444'; saveBtn.style.opacity='1'; saveBtn.disabled=false; }
  });
}

// 按日期降序排列（最新在前），兼容无date字段
function _replaySortDesc(arr){
  return arr.slice().sort(function(a, b){
    var da = a.date || '0000-00-00';
    var db = b.date || '0000-00-00';
    return db < da ? -1 : db > da ? 1 : 0;
  });
}

function replayLoad(){
  // localStorage 先渲染
  try{
    var raw = localStorage.getItem(_REPLAY_LS_KEY);
    if(raw) _replayData = _replaySortDesc(JSON.parse(raw));
  }catch(e){}
  if(!_replayData.length) _replayData.push(_replayDefaultTab());
  _replayCurTab = 0;
  replayRender();

  // GitHub 异步同步
  fetch('https://api.github.com/repos/' + _MVP_GH_OWNER + '/' + _MVP_GH_REPO + '/contents/' + _MVP_GH_FILE + '?t=' + Date.now(), {
    cache: 'no-cache',
    headers: {'Authorization':'token ' + _MVP_GH_TOKEN}
  }).then(function(r){ return r.json(); }).then(function(d){
    var data = {};
    // 文件内容为空时不处理，防止空数据覆盖本地历史
    if(!d.content || d.content.replace(/\n/g,'').length === 0) return;
    try{ data = JSON.parse(decodeURIComponent(escape(atob(d.content.replace(/\n/g,''))))); }catch(e){}
    if(data.replay_data && data.replay_data.length){
      _replayData = _replaySortDesc(data.replay_data);
      try{ localStorage.setItem(_REPLAY_LS_KEY, JSON.stringify(_replayData)); }catch(e){}
      replayRender(); // 首次加载时同步 GitHub 数据
    }
  }).catch(function(){});
}

// ===================== 玩家胜率 =====================
function renderWinRate(){
  var grid = document.getElementById('winrate-grid');
  var totalTag = document.getElementById('winrate-total-tag');
  if(!grid) return;

  var totalGames = _replayData.length;
  if(totalTag) totalTag.textContent = '共 ' + totalGames + ' 局';

  // 统计每个玩家的胜负（直接从 seats.faction 读取）
  var playerMap = {};

  _replayData.forEach(function(tab){
    var winner = tab.winner; // 'good' | 'wolf' | 'third' | ''
    if(!tab.seats) return;

    tab.seats.forEach(function(s){
      var name = (s.name || '').trim();
      if(!name) return;
      var fc = s.faction || ''; // 平民/神职/狼人/三方
      if(!fc) return; // 没有设置阵营的不统计

      if(!playerMap[name]) playerMap[name] = {win:0, total:0};
      playerMap[name].total += 1;

      var isWin = false;
      if(winner === 'wolf' && fc === '狼人') isWin = true;
      if(winner === 'good' && (fc === '平民' || fc === '神职')) isWin = true;
      if(winner === 'third' && fc === '三方') isWin = true;
      if(isWin) playerMap[name].win += 1;
    });
  });

  // 过滤出至少出现过1次的玩家，按胜率降序排列
  var players = Object.keys(playerMap).filter(function(name){
    return playerMap[name].total >= 1;
  }).sort(function(a, b){
    var ra = playerMap[a].total ? playerMap[a].win / playerMap[a].total : 0;
    var rb = playerMap[b].total ? playerMap[b].win / playerMap[b].total : 0;
    if(rb !== ra) return rb - ra;
    return playerMap[b].win - playerMap[a].win;
  });

  if(!players.length){
    grid.innerHTML = '<span style="color:#555;font-size:13px;padding:8px 0">复盘记录中暂无玩家名字数据</span>';
    return;
  }

  var winrateMedalBorder = ['#c9a84c','#9ca3af','#cd7f32'];

  grid.innerHTML = players.map(function(name, idx){
    var d = playerMap[name];
    var pct = d.total ? Math.round(d.win / d.total * 100) : 0;
    // 颜色：≥60% 金色，40-59% 蓝色，<40% 红色
    var color = pct >= 60 ? '#e8c96a' : pct >= 40 ? '#818cf8' : '#f87171';
    var barColor = pct >= 60 ? 'linear-gradient(90deg,#c9a84c,#f5d36a)' : pct >= 40 ? 'linear-gradient(90deg,#4f6ef7,#818cf8)' : 'linear-gradient(90deg,#b91c1c,#f87171)';
    var border = idx < 3 ? '2px solid ' + winrateMedalBorder[idx] + ';box-shadow:0 0 10px ' + winrateMedalBorder[idx] + '55' : '1.5px solid #333';
    return '<div style="width:110px;background:#111;border:' + border + ';border-radius:10px;padding:10px 10px 8px;display:flex;flex-direction:column;align-items:center;gap:5px">' +
      '<div style="font-size:13px;font-weight:800;color:#e8d5a3;letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px;text-align:center">' + name + '</div>' +
      '<div style="font-size:26px;font-weight:900;color:' + color + ';letter-spacing:-1px;line-height:1">' + pct + '<span style="font-size:13px;font-weight:700">%</span></div>' +
      '<div style="width:100%;background:#222;border-radius:4px;height:6px;overflow:hidden">' +
        '<div style="height:100%;border-radius:4px;background:' + barColor + ';width:' + pct + '%"></div>' +
      '</div>' +
      '<div style="font-size:11px;color:#666;letter-spacing:.5px">' + d.win + ' 胜 / ' + d.total + ' 局</div>' +
      '</div>';
  }).join('');
}

// hook 到 replayRender 之后自动刷新胜率 + 上警数量
var _origReplayRender = replayRender;
replayRender = function(){
  try{ _origReplayRender(); }catch(e){ console.error('replayRender err:', e); }
  try{ renderWinRate(); }catch(e){ console.error('renderWinRate err:', e); }
  try{ renderScoreBoard(); }catch(e){ console.error('renderScoreBoard err:', e); }
  // 上警数量跟随当前局座位数
  try{
    var tab = _replayData[_replayCurTab];
    var seatCount = (tab && tab.seats) ? tab.seats.length : 0;
    var curBtnCount = document.querySelectorAll('.num-btn').length;
    if(seatCount !== curBtnCount) buildNumPicker(seatCount);
  }catch(e){}
};
renderWinRate();
renderScoreBoard();


// ===================== 积分榜 =====================
function renderScoreBoard(){
  var grid = document.getElementById('score-grid');
  if(!grid) return;

  // 统计积分
  // 胜利 +2，失败 +1，MVP榜里出现名字 +1
  var scoreMap = {};

  // 从 MVP 榜统计每个名字出现的次数
  var mvpNames = {};
  _mvpCards.forEach(function(c){
    var n = (c.name || '').trim();
    if(n) mvpNames[n] = (mvpNames[n] || 0) + 1;
  });

  _replayData.forEach(function(tab){
    var winner = tab.winner; // 'good'|'wolf'|'third'|''
    if(!tab.seats) return;

    tab.seats.forEach(function(s){
      var name = (s.name || '').trim();
      if(!name) return;
      var fc = s.faction || '';
      if(!fc) return;

      if(!scoreMap[name]) scoreMap[name] = {score:0, win:0, lose:0, mvp:0};

      var isWin = false;
      if(winner === 'wolf' && fc === '狼人') isWin = true;
      if(winner === 'good' && (fc === '平民' || fc === '神职')) isWin = true;
      if(winner === 'third' && fc === '三方') isWin = true;

      if(winner){ // 有胜负结果才计分
        if(isWin){ scoreMap[name].score += 2; scoreMap[name].win++; }
        else{ scoreMap[name].score += 1; scoreMap[name].lose++; }
      }
    });
  });

  // MVP 加分：每次出现 +1 分（即使没参加对战也要出现在榜上）
  Object.keys(mvpNames).forEach(function(name){
    if(!scoreMap[name]) scoreMap[name] = {score:0, win:0, lose:0, mvp:0};
    scoreMap[name].mvp = mvpNames[name];
    scoreMap[name].score += mvpNames[name];
  });

  var players = Object.keys(scoreMap).sort(function(a,b){
    return scoreMap[b].score - scoreMap[a].score;
  });

  if(!players.length){
    grid.innerHTML = '<span style="color:#555;font-size:13px;padding:8px 0">暂无数据，请先填写对战情况</span>';
    return;
  }

  var medals = [
    '<span style="font-size:18px;filter:drop-shadow(0 0 4px #c9a84c)">🥇</span>',
    '<span style="font-size:18px;filter:drop-shadow(0 0 4px #9ca3af)">🥈</span>',
    '<span style="font-size:18px;filter:drop-shadow(0 0 4px #cd7f32)">🥉</span>'
  ];
  var medalBorder = ['#c9a84c','#9ca3af','#cd7f32'];
  var medalScoreColor = ['#e8c96a','#d1d5db','#cd9b6b'];

  grid.innerHTML = players.map(function(name, idx){
    var d = scoreMap[name];
    var mvpTag = '<div style="font-size:10px;font-weight:700;margin-top:2px;' + (d.mvp ? 'color:#e8c96a' : 'visibility:hidden') + '">⭐ MVP x' + (d.mvp || 1) + '</div>';

    if(idx < 3){
      return '<div style="width:110px;min-height:110px;background:#111;border:2px solid ' + medalBorder[idx] + ';border-radius:10px;padding:10px 10px 8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;box-shadow:0 0 10px ' + medalBorder[idx] + '55">' +
        '<div style="line-height:1;margin-bottom:2px">' + medals[idx] + '</div>' +
        '<div style="font-size:13px;font-weight:800;color:#e8d5a3;letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px;text-align:center">' + name + '</div>' +
        '<div style="font-size:28px;font-weight:900;color:' + medalScoreColor[idx] + ';letter-spacing:-1px;line-height:1">' + d.score + '<span style="font-size:11px;font-weight:600;color:#888">分</span></div>' +
        mvpTag +
        '</div>';
    } else {
      return '<div style="width:110px;min-height:110px;background:#111;border:1.5px solid #333;border-radius:10px;padding:10px 10px 8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px">' +
        '<div style="font-size:12px;color:#555;line-height:1">#' + (idx+1) + '</div>' +
        '<div style="font-size:13px;font-weight:800;color:#e8d5a3;letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px;text-align:center">' + name + '</div>' +
        '<div style="font-size:28px;font-weight:900;color:#818cf8;letter-spacing:-1px;line-height:1">' + d.score + '<span style="font-size:11px;font-weight:600;color:#888">分</span></div>' +
        mvpTag +
        '</div>';
    }
  }).join('');
}
// ===================== 积分榜 END =====================

// ===================== 实时轮询同步 =====================
// 每 30 秒自动从 GitHub 拉取最新数据，保证所有人看到的数据实时一致
function _updateSyncTag(ok){
  var el = document.getElementById('sync-status-tag');
  if(!el) return;
  var now = new Date();
  var hh = String(now.getHours()).padStart(2,'0');
  var mm = String(now.getMinutes()).padStart(2,'0');
  var ss = String(now.getSeconds()).padStart(2,'0');
  if(ok){
    el.textContent = '✅ 已同步 ' + hh + ':' + mm + ':' + ss;
    el.style.background = 'rgba(82,196,26,.22)';
    el.style.border = '1px solid rgba(82,196,26,.5)';
  } else {
    el.textContent = '⚠️ 同步失败 ' + hh + ':' + mm + ':' + ss;
    el.style.background = 'rgba(255,77,79,.18)';
    el.style.border = '1px solid rgba(255,77,79,.4)';
  }
}

function _pollGitHub(){
  fetch('https://api.github.com/repos/' + _MVP_GH_OWNER + '/' + _MVP_GH_REPO + '/contents/' + _MVP_GH_FILE + '?t=' + Date.now(), {
    cache: 'no-cache',
    headers: {'Authorization':'token ' + _MVP_GH_TOKEN}
  }).then(function(r){ return r.json(); }).then(function(d){
    if(!d || !d.content){ _updateSyncTag(false); return; }
    var raw = '';
    try{ raw = decodeURIComponent(escape(atob(d.content.replace(/\n/g,'')))); }catch(e){ _updateSyncTag(false); return; }
    var data = {};
    try{ data = JSON.parse(raw); }catch(e){ _updateSyncTag(false); return; }

    // --- MVP ---
    if(data.cards){
      _mvpGhSha = d.sha;
      _mvpCards = data.cards || [];
      _mvpIdCounter = data.counter || 0;
      try{ localStorage.setItem(_MVP_KEY, JSON.stringify({cards:_mvpCards, counter:_mvpIdCounter})); }catch(e){}
      if(!_mvpCards.length) _mvpCards.push({id:++_mvpIdCounter, name:'', img:'', date:_todayStr(), role:''});
      renderMvpCards();
      try{ renderScoreBoard(); }catch(e){}
    }
    // --- 对战阵容 ---
    if(data.battle_roster){
      _battleData = Object.assign({good:[],shen:[],wolf:[],third:[]}, data.battle_roster);
      try{ localStorage.setItem(_BATTLE_LS_KEY, JSON.stringify(_battleData)); }catch(e){}
      battleRenderAll();
    }
    // --- 复盘（轮询不覆盖，由手动保存按钮控制）---
    // 仅在首次加载时同步，后续由用户手动保存

    _updateSyncTag(true);
  }).catch(function(){ _updateSyncTag(false); });
}

// 自动轮询已禁用，仅手动点击「💾 保存同步」按钮时同步

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>狼人杀辅助</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#0a0a12;color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column}
#app{display:flex;flex:1;height:100vh}
.header{background:linear-gradient(90deg,#0d0d1a,#1a1a2e,#0d0d1a);border-bottom:1px solid rgba(0,240,255,0.2);padding:0 20px;height:48px;display:flex;align-items:center;flex-shrink:0}
.header span{font-size:16px;font-weight:700;color:#00f0ff}
.sidebar{width:190px;background:#0d0d18;border-right:1px solid rgba(255,255,255,0.03);flex-shrink:0;overflow-y:auto;padding:10px 0}
.sidebar-grp{padding:5px 18px 3px;font-size:10px;color:#555;font-weight:700;letter-spacing:2px}
.sidebar-item{padding:8px 18px;font-size:12px;color:#888;cursor:pointer;border-left:3px solid transparent;transition:all .2s;display:flex;align-items:center;gap:7px;background:none;border-top:none;border-right:none;border-bottom:none;width:100%;text-align:left}
.sidebar-item:hover{background:rgba(0,240,255,0.03);color:#ddd}
.sidebar-item.active{background:linear-gradient(90deg,rgba(0,240,255,0.06),rgba(0,136,255,0.06));color:#00f0ff;border-left-color:#00f0ff;font-weight:600}
.sidebar-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.main{flex:1;overflow-y:auto;padding:16px 24px}
.section{margin-bottom:16px}
.section-hd{display:flex;align-items:center;gap:8px;padding:8px 14px;background:linear-gradient(90deg,#0d0d1a,#1a1a2e);border:1px solid rgba(255,255,255,0.03);border-radius:8px 8px 0 0;border-bottom:1px solid rgba(0,240,255,0.15)}
.section-hd span{font-size:13px;font-weight:700;color:#fff;letter-spacing:1px}
.section-body{background:#0d0d15;border:1px solid rgba(255,255,255,0.03);border-top:none;border-radius:0 0 8px 8px;padding:14px 16px}
.card-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.card{background:#12121e;border:1px solid rgba(255,255,255,0.03);border-radius:10px;padding:14px 10px;text-align:center;cursor:pointer;transition:all .2s}
.card:hover{border-color:rgba(0,240,255,0.25);transform:translateY(-2px)}
.card.sel{border-color:#00f0ff;box-shadow:0 0 16px rgba(0,240,255,0.2);background:rgba(0,240,255,0.04)}
.card-icon{font-size:40px;margin-bottom:6px}
.card-name{font-size:13px;color:#ccc;font-weight:700;margin-bottom:2px}
.card-desc{font-size:10px;color:#666;line-height:1.4;margin-top:4px}
.card-tag{font-size:10px;padding:2px 10px;border-radius:10px;margin-top:6px;display:inline-block;font-weight:600}
.tag-wolf{background:rgba(255,45,123,0.1);color:#ff2d7b;border:1px solid rgba(255,45,123,0.2)}
.tag-god{background:rgba(0,240,255,0.08);color:#00f0ff;border:1px solid rgba(0,240,255,0.2)}
.tag-vil{background:rgba(74,222,128,0.08);color:#4ade80;border:1px solid rgba(74,222,128,0.2)}
.tag-3rd{background:rgba(255,140,0,0.08);color:#ff8c00;border:1px solid rgba(255,140,0,0.2)}
.btn{padding:7px 16px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid;transition:all .2s;display:inline-flex;align-items:center;gap:4px;background:transparent;color:#fff}
.btn-cyan{background:rgba(0,240,255,0.08);border-color:#00f0ff;color:#00f0ff}
.btn-cyan:hover{background:#00f0ff;color:#0a0a12}
.btn-pink{background:rgba(255,45,123,0.08);border-color:#ff2d7b;color:#ff2d7b}
.btn-pink:hover{background:#ff2d7b;color:#fff}
.btn-purple{background:rgba(184,41,240,0.08);border-color:#b829f0;color:#b829f0}
.btn-purple:hover{background:#b829f0;color:#fff}
.btn-sm{padding:3px 10px;font-size:10px}
.dice-box{display:flex;gap:16px;justify-content:center;padding:20px}
.dice{width:72px;height:72px;background:#12121e;border:2px solid rgba(0,240,255,0.2);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:900;color:#00f0ff;cursor:pointer;user-select:none}
.dice.rolling{animation:r .1s linear infinite}
@keyframes r{0%{transform:rotate(0deg)}25%{transform:rotate(90deg)}50%{transform:rotate(180deg)}75%{transform:rotate(270deg)}100%{transform:rotate(360deg)}}
.timer-txt{font-size:56px;font-weight:900;text-align:center;letter-spacing:4px;padding:8px 0}
.timer-txt.on{color:#00f0ff;text-shadow:0 0 30px rgba(0,240,255,0.4)}
.timer-txt.warn{color:#ff8c00;text-shadow:0 0 30px rgba(255,140,0,0.4)}
.timer-txt.off{color:#4ade80;text-shadow:0 0 30px rgba(74,222,128,0.25)}
.inp{background:#12121e;border:1px solid rgba(255,255,255,0.08);border-radius:5px;padding:7px 10px;color:#fff;font-size:12px;outline:none;width:100%}
.inp:focus{border-color:#00f0ff}
.inp-sm{padding:4px 6px;font-size:10px}
.tabs{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.tab{padding:6px 16px;border-radius:16px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,0.06);color:#888;transition:all .2s;background:transparent}
.tab:hover{color:#ddd}
.tab.on{background:rgba(0,240,255,0.08);border-color:#00f0ff;color:#00f0ff}
.roster-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.roster-card{background:#12121e;border:1px solid rgba(255,255,255,0.03);border-radius:8px;padding:10px;display:flex;align-items:center;gap:8px}
.roster-av{width:40px;height:40px;border-radius:50%;background:#1a1a2e;display:flex;align-items:center;justify-content:center;font-size:18px;border:2px solid rgba(255,255,255,0.06);flex-shrink:0}
.roster-info{flex:1}
.roster-name{font-size:12px;color:#ddd;font-weight:600}
.roster-role{font-size:10px;color:#888}
.death-grid{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.death-card{width:58px;height:80px;border-radius:7px;background:#12121e;border:2px solid rgba(255,255,255,0.06);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
.death-card:hover{border-color:#ff2d7b60}
.death-card.dead{opacity:.35;filter:grayscale(1)}
.death-card-num{font-size:22px;font-weight:900;color:#00f0ff}
.death-card-role{font-size:9px;color:#888;margin-top:2px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px}
.stat-card{background:#12121e;border:1px solid rgba(255,255,255,0.03);border-radius:8px;padding:12px;text-align:center}
.stat-card.gold{border-color:#ffd700;box-shadow:0 0 10px rgba(255,215,0,0.1)}
.stat-card.silver{border-color:#c0c0c0;box-shadow:0 0 10px rgba(192,192,192,0.1)}
.stat-card.bronze{border-color:#cd7f32;box-shadow:0 0 10px rgba(205,127,50,0.1)}
.stat-name{font-size:12px;color:#ccc;font-weight:700;margin-bottom:3px}
.stat-val{font-size:24px;font-weight:900;color:#00f0ff}
.stat-sub{font-size:10px;color:#666;margin-top:2px}
.bar{height:5px;background:rgba(255,255,255,0.03);border-radius:3px;overflow:hidden;margin:5px 0}
.bar-fill{height:100%;border-radius:3px;transition:width .5s}
.bar-cyan{background:linear-gradient(90deg,#00f0ff,#0088ff)}
.bar-pink{background:linear-gradient(90deg,#ff2d7b,#b829f0)}
.night-row{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#12121e;border-radius:6px;border:1px solid rgba(255,255,255,0.03);margin-bottom:6px}
.night-label{font-size:11px;color:#888;width:70px;flex-shrink:0}
.night-btns{flex:1;display:flex;gap:4px;flex-wrap:wrap}
.replay-card{background:#12121e;border:1px solid rgba(255,255,255,0.03);border-radius:8px;padding:12px;margin-bottom:8px}
.replay-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.replay-title{font-size:13px;font-weight:700;color:#fff}
.toast{position:fixed;top:56px;right:16px;z-index:999;background:#12121e;border:1px solid #00f0ff;color:#00f0ff;padding:8px 16px;border-radius:6px;font-size:12px;pointer-events:none}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:3px}
</style>
</head>
<body>
<div id="app">
<div class="header"><span>🐺 WOLF KILLER · 狼人杀辅助</span></div>
<nav class="sidebar" id="sidebar"></nav>
<main class="main" id="main"></main>
</div>
<div id="toast-box"></div>
<script>
// === DATA ===
var WL=[{id:'wolf',name:'狼人',icon:'🐺',camp:'wolf',desc:'每晚可击杀一名玩家'},{id:'wolfking',name:'狼王',icon:'👑',camp:'wolf',desc:'出局时可开枪带走一人'},{id:'wolfwhite',name:'白狼王',icon:'🦊',camp:'wolf',desc:'自爆直接进入天黑'},{id:'wolfbeauty',name:'狼美人',icon:'💄',camp:'wolf',desc:'魅惑一人，出局带走'},{id:'stonewolf',name:'石像鬼',icon:'🗿',camp:'wolf',desc:'查验身份，不见面'},{id:'bigwolf',name:'大野狼',icon:'🐗',camp:'wolf',desc:'普通狼死后可刀人'},{id:'wolfbro',name:'狼兄',icon:'🐺',camp:'wolf',desc:'与狼弟互知身份'},{id:'wolfsis',name:'狼弟',icon:'🐺',camp:'wolf',desc:'狼兄死后可变狼人'}];
var GD=[{id:'seer',name:'预言家',icon:'🔮',camp:'god',desc:'每晚查验一人身份'},{id:'witch',name:'女巫',icon:'🧪',camp:'god',desc:'一瓶解药一瓶毒药'},{id:'hunter',name:'猎人',icon:'🔫',camp:'god',desc:'出局时可开枪带人'},{id:'guard',name:'守卫',icon:'🛡️',camp:'god',desc:'每晚守护一人免死'},{id:'idiot',name:'白痴',icon:'🤡',camp:'god',desc:'票出翻牌免死失权'},{id:'knight',name:'骑士',icon:'⚔️',camp:'god',desc:'白天决斗狼死己死'},{id:'elder',name:'长老',icon:'👴',camp:'god',desc:'有两条命首刀不死'},{id:'magician',name:'魔术师',icon:'🎩',camp:'god',desc:'每晚交换两人号码'},{id:'bear',name:'熊',icon:'🐻',camp:'god',desc:'相邻有狼则咆哮'},{id:'fox',name:'子狐',icon:'🦊',camp:'god',desc:'可查验一人阵营'},{id:'crow',name:'乌鸦',icon:'🐦',camp:'god',desc:'每晚诅咒一人+1票'}];
var VL=[{id:'villager',name:'平民',icon:'👥',camp:'villager',desc:'无特殊技能，投票'},{id:'ghost',name:'替罪羊',icon:'🐑',camp:'villager',desc:'平票时代替出局'},{id:'wild',name:'野孩子',icon:'🧒',camp:'villager',desc:'偶像死后变狼人'}];
var TD=[{id:'cupid',name:'丘比特',icon:'💘',camp:'third',desc:'首夜连两人为情侣'},{id:'bomber',name:'炸弹人',icon:'💣',camp:'third',desc:'被票出局带死投票者'},{id:'thief',name:'盗贼',icon:'🧟',camp:'third',desc:'额外两张牌选一张'},{id:'flute',name:'吹笛者',icon:'🎵',camp:'third',desc:'每晚蛊惑两人'},{id:'angel',name:'天使',icon:'👼',camp:'third',desc:'首日不死独自胜利'}];
var ALL=WL.concat(GD).concat(VL).concat(TD);
var NAV=[{id:'roles',icon:'🎭',label:'角色选取',g:'游戏'},{id:'battle',icon:'⚔️',label:'对战情况',g:'游戏'},{id:'sheriff',icon:'⭐',label:'警长竞选',g:'游戏'},{id:'dice',icon:'🎲',label:'随机骰子',g:'工具'},{id:'timer',icon:'⏱️',label:'发言计时',g:'工具'},{id:'night',icon:'🌙',label:'天黑请闭眼',g:'游戏'},{id:'death',icon:'💀',label:'死亡情况',g:'记录'},{id:'replay',icon:'📝',label:'对局记录',g:'记录'},{id:'mvp',icon:'🏆',label:'MVP榜',g:'统计'},{id:'winrate',icon:'📈',label:'玩家胜率',g:'统计'},{id:'score',icon:'🌟',label:'积分榜',g:'统计'}];
var S={page:'roles',n:12,ps:[],roles:[],sf:'',deaths:[],tm:180,tmRun:false,tmId:null,replays:[],mvp:[]};
var rf='all';

// === UTILS ===
function hdr(icon,title){return '<div class="section"><div class="section-hd"><span>'+icon+' '+title+'</span></div>';}
function toast(msg){var c=document.getElementById('toast-box');var d=document.createElement('div');d.className='toast';d.textContent=msg;c.appendChild(d);setTimeout(function(){d.remove();},2500);}
function cn(camp){var m={wolf:'狼人',god:'神职',villager:'平民',third:'第三方'};return m[camp]||camp;}
function fmt(t){var m=Math.floor(t/60),s=t%60;return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');}
function ld(){try{var r=JSON.parse(localStorage.getItem('wr'));if(r)S.replays=r;}catch(e){}try{var m=JSON.parse(localStorage.getItem('wm'));if(m)S.mvp=m;}catch(e){}}
function lsr(){try{localStorage.setItem('wr',JSON.stringify(S.replays));}catch(e){}}
function lsm(){try{localStorage.setItem('wm',JSON.stringify(S.mvp));}catch(e){}}

// === SIDEBAR ===
function rsb(){var sb=document.getElementById('sidebar'),h='',lg='';NAV.forEach(function(item){if(item.g!==lg){h+='<div class="sidebar-grp">'+item.g+'</div>';lg=item.g;}var a=S.page===item.id?' active':'';var dc={roles:'#b829f0',battle:'#4ade80',sheriff:'#ffd700',dice:'#ff8c00',timer:'#00f0ff',night:'#ff2d7b',death:'#888',replay:'#b829f0',mvp:'#ffd700',winrate:'#00f0ff',score:'#4ade80'};h+='<button class="sidebar-item'+a+'" onclick="go(''+item.id+'')"><span class="sidebar-dot" style="color:'+(dc[item.id]||'#888')+'"></span><span>'+item.icon+' '+item.label+'</span></button>';});sb.innerHTML=h;}

function go(page){S.page=page;rsb();rp();}

// === MAIN RENDER ===
function rp(){var m=document.getElementById('main');try{switch(S.page){case'roles':rroles(m);break;case'battle':rbattle(m);break;case'sheriff':rsheriff(m);break;case'dice':rdice(m);break;case'timer':rtimer(m);break;case'night':rnight(m);break;case'death':rdeath(m);break;case'replay':rreplay(m);break;case'mvp':rmvp(m);break;case'winrate':rwinrate(m);break;case'score':rscore(m);break;}}catch(e){m.innerHTML='<div style="color:red;padding:20px">Error: '+e.message+'</div>';}}

// === ROLES ===
function rroles(m){var h=hdr('🎭','角色选取')+'<div class="section-body"><div class="tabs" id="rtabs"></div><div class="card-grid" id="rg"></div><div style="margin-top:12px;font-size:12px;color:#888" id="sr">已选角色：</div></div></div>';m.innerHTML=h;var tabs=[{id:'all',l:'全部'},{id:'wolf',l:'🐺 狼人阵营'},{id:'god',l:'✨ 神职阵营'},{id:'villager',l:'👥 平民阵营'},{id:'third',l:'🎯 第三方'}];var th='';tabs.forEach(function(t){th+='<button class="tab on" onclick="fr(''+t.id+'')">'+t.l+'</button>';});document.getElementById('rtabs').innerHTML=th;fr('all');}
function fr(camp){rf=camp;var g=document.getElementById('rg'),roles=camp==='all'?ALL:ALL.filter(function(r){return r.camp===camp;}),h='';roles.forEach(function(r){var s=S.roles.indexOf(r.id)>=0?' sel':'';h+='<div class="card'+s+'" onclick="tr(''+r.id+'')"><div class="card-icon">'+r.icon+'</div><div class="card-name">'+r.name+'</div><div class="card-desc">'+r.desc+'</div><div class="card-tag tag-'+r.camp+'">'+cn(r.camp)+'</div></div>';});g.innerHTML=h;usr();var tabs=document.querySelectorAll('#rtabs .tab');tabs.forEach(function(t){var labels={all:'全部',wolf:'狼人',god:'神职',villager:'平民',third:'第三方'};t.classList.toggle('on',t.textContent.indexOf(labels[camp])>=0);});}
function tr(id){var i=S.roles.indexOf(id);if(i>=0)S.roles.splice(i,1);else S.roles.push(id);fr(rf);}
function usr(){var e=document.getElementById('sr');if(!e)return;var ns=S.roles.map(function(id){var r=ALL.find(function(x){return x.id===id;});return r?r.icon+' '+r.name:id;});e.innerHTML='已选角色：'+ns.join('、')+' （共'+S.roles.length+'个）';}

// === BATTLE ===
function rbattle(m){var h=hdr('⚔️','对战情况')+'<div class="section-body"><div class="roster-grid" id="br"></div><div style="margin-top:12px;display:flex;gap:8px"><button class="btn btn-cyan" onclick="rr()">🎲 随机分配</button><button class="btn btn-pink" onclick="rbt()">🔄 重置</button></div></div></div>';m.innerHTML=h;rbr();}
function rbr(){var g=document.getElementById('br');if(!g)return;if(!S.ps.length){g.innerHTML='<div style="color:#666;font-size:12px;padding:16px;text-align:center">请先在下方设置玩家人数</div>';return;}var h='';S.ps.forEach(function(p){var r=ALL.find(function(x){return x.id===p.role;});h+='<div class="roster-card"><div class="roster-av">'+(r?r.icon:p.id)+'</div><div class="roster-info"><div class="roster-name">#'+p.id+' '+p.name+'</div><div class="roster-role">'+(r?r.name:'未分配')+'</div></div><button class="btn btn-sm btn-cyan" onclick="cr('+p.id+')">🔄</button></div>';});g.innerHTML=h;}
function rr(){if(S.roles.length<S.ps.length){toast('⚠️ 角色不足');return;}var sh=[].concat(S.roles).sort(function(){return Math.random()-0.5;});S.ps.forEach(function(p,i){p.role=sh[i]||'';var r=ALL.find(function(x){return x.id===p.role;});p.camp=r?r.camp:'';});rbr();toast('✅ 已分配');}
function cr(id){var p=S.ps.find(function(x){return x.id===id;});if(!p)return;var i=S.roles.indexOf(p.role),nx=(i+1)%S.roles.length;p.role=S.roles[nx]||'';var r=ALL.find(function(x){return x.id===p.role;});p.camp=r?r.camp:'';rbr();}
function rbt(){S.ps.forEach(function(p){p.role='';p.camp='';p.alive=true;});S.deaths=[];S.sf='';rbr();toast('🔄 已重置');}

// === SHERIFF ===
function rsheriff(m){var h=hdr('⭐','警长竞选')+'<div class="section-body"><div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px" id="sc"></div><div style="font-size:12px;color:#888">当前警长：<span style="color:#ffd700;font-weight:700">'+(S.sf||'无')+'</span></div><div style="margin-top:10px;display:flex;gap:8px"><button class="btn btn-cyan" onclick="rsv()">🎲 随机投票</button><button class="btn btn-pink" onclick="clsf()">❌ 清除</button></div></div></div>';m.innerHTML=h;var sc=document.getElementById('sc');S.ps.forEach(function(p){sc.innerHTML+='<button class="btn btn-sm btn-purple" onclick="esf('+p.id+')">#'+p.id+' '+p.name+'</button>';});}
function esf(id){var p=S.ps.find(function(x){return x.id===id;});if(!p)return;S.sf=p.name;toast('⭐ 警长：'+p.name);rp();}
function rsv(){var a=S.ps.filter(function(p){return p.alive;});if(!a.length)return;var w=a[Math.floor(Math.random()*a.length)];S.sf=w.name;toast('🎲 警长：'+w.name);rp();}
function clsf(){S.sf='';toast('❌ 已清除');rp();}

// === DICE ===
function rdice(m){m.innerHTML=hdr('🎲','随机骰子')+'<div class="section-body"><div class="dice-box"><div class="dice" id="d1" onclick="rd(1)">?</div><div class="dice" id="d2" onclick="rd(2)">?</div></div><div style="text-align:center;margin-top:8px"><button class="btn btn-cyan" onclick="ra()">🎲 全部掷出</button></div></div></div>';}
function rd(n){var e=document.getElementById('d'+n);if(!e)return;e.classList.add('rolling');var r=Math.floor(Math.random()*6)+1;var f=['','⚀','⚁','⚂','⚃','⚄','⚅'];setTimeout(function(){e.classList.remove('rolling');e.textContent=f[r];},500+Math.random()*500);}
function ra(){rd(1);rd(2);}

// === TIMER ===
function rtimer(m){var h=hdr('⏱️','发言计时')+'<div class="section-body"><div class="timer-txt off" id="td">'+fmt(S.tm)+'</div><div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap"><button class="btn btn-cyan" onclick="stm()">▶️ 开始</button><button class="btn btn-pink" onclick="ptm()">⏸️ 暂停</button><button class="btn btn-purple" onclick="rtm()">🔄 重置</button></div><div style="display:flex;gap:6px;margin-top:8px;justify-content:center;flex-wrap:wrap">';[60,90,120,150,180,240,300].forEach(function(t){h+='<button class="btn btn-sm btn-purple" onclick="setTm('+t+')">'+t+'s</button>';});h+='</div></div></div>';m.innerHTML=h;}
function setTm(t){S.tm=t;S.tmRun=false;clearInterval(S.tmId);var e=document.getElementById('td');if(e){e.textContent=fmt(t);e.className='timer-txt off';}}
function stm(){if(S.tmRun)return;S.tmRun=true;var e=document.getElementById('td');if(e)e.className='timer-txt on';S.tmId=setInterval(function(){S.tm--;if(e)e.textContent=fmt(S.tm);if(S.tm<=30&&e)e.className='timer-txt warn';if(S.tm<=0){ptm();if(e)e.className='timer-txt off';toast('⏰ 时间到！');}},1000);}
function ptm(){S.tmRun=false;clearInterval(S.tmId);var e=document.getElementById('td');if(e)e.className='timer-txt off';}
function rtm(){ptm();S.tm=180;var e=document.getElementById('td');if(e){e.textContent=fmt(180);e.className='timer-txt off';}}

// === NIGHT ===
function rnight(m){m.innerHTML=hdr('🌙','天黑请闭眼')+'<div class="section-body"><div class="night-row"><div class="night-label">🐺 狼人刀</div><div class="night-btns" id="wk"></div></div><div class="night-row"><div class="night-label">🔮 预言家验</div><div class="night-btns" id="sc"></div></div><div class="night-row"><div class="night-label">🧪 女巫</div><div class="night-btns" id="ws"></div></div><div class="night-row"><div class="night-label">🛡️ 守卫</div><div class="night-btns" id="gp"></div></div><div style="margin-top:12px;display:flex;gap:8px"><button class="btn btn-cyan" onclick="an()">☀️ 天亮了</button></div></div></div>';rnb();}
function rnb(){var a=S.ps.filter(function(p){return p.alive;});function mb(id){var h='';a.forEach(function(p){h+='<button class="btn btn-sm btn-purple" onclick="ns(''+id+'','+p.id+')">#'+p.id+' '+p.name+'</button>';});return h;}['wk','sc','ws','gp'].forEach(function(id){var e=document.getElementById(id);if(e)e.innerHTML=mb(id);});}
function ns(type,pid){var p=S.ps.find(function(x){return x.id===pid;});if(!p)return;var a={wk:'被狼人击杀',sc:'被预言家查验',ws:'被女巫关注',gp:'被守卫守护'};toast('🌙 '+a[type]+'：#'+pid+' '+p.name);}
function an(){S.deaths.forEach(function(d){var p=S.ps.find(function(x){return x.id===d;});if(p)p.alive=false;});toast('☀️ 天亮了！');go('battle');}

// === DEATH ===
function rdeath(m){m.innerHTML=hdr('💀','死亡情况')+'<div class="section-body"><div class="death-grid" id="dg"></div><div style="margin-top:12px;display:flex;gap:8px"><button class="btn btn-cyan" onclick="rds()">🔄 重置</button></div></div></div>';rdg();}
function rdg(){var g=document.getElementById('dg');if(!g)return;if(!S.ps.length){g.innerHTML='<div style="color:#666;font-size:12px;padding:16px;text-align:center">暂无玩家</div>';return;}var h='';S.ps.forEach(function(p){var d=S.deaths.indexOf(p.id)>=0,r=ALL.find(function(x){return x.id===p.role;});h+='<div class="death-card'+(d?' dead':'')+'" onclick="td('+p.id+')"><div class="death-card-num">'+p.id+'</div><div class="death-card-role">'+(r?r.name:'?')+'</div></div>';});g.innerHTML=h;}
function td(id){var i=S.deaths.indexOf(id);if(i>=0)S.deaths.splice(i,1);else S.deaths.push(id);rdg();}
function rds(){S.deaths=[];S.ps.forEach(function(p){p.alive=true;});rdg();toast('🔄 已重置');}

// === REPLAY ===
function rreplay(m){m.innerHTML=hdr('📝','对局记录')+'<div class="section-body"><div id="rl"></div><div style="margin-top:12px;display:flex;gap:8px"><button class="btn btn-cyan" onclick="saveR()">💾 保存</button><button class="btn btn-pink" onclick="exportR()">📤 导出</button><button class="btn btn-purple" onclick="clearR()">🗑️ 清空</button></div></div></div>';rrl();}
function rrl(){var l=document.getElementById('rl');if(!l)return;if(!S.replays.length){l.innerHTML='<div style="color:#666;font-size:12px;padding:16px;text-align:center">暂无对局记录</div>';return;}var h='',wm={wolf:'🐺狼人',good:'👥好人',third:'🎯第三方'};S.replays.forEach(function(r,i){h+='<div class="replay-card"><div class="replay-hd"><div class="replay-title">#'+(i+1)+' '+r.date+'</div><div style="color:#ffd700">'+(wm[r.winner]||'?')+' 胜利</div></div><div style="font-size:11px;color:#888;margin-bottom:3px">'+r.ps.length+'人局 | 警长：'+(r.sf||'无')+'</div><div style="display:flex;flex-wrap:wrap;gap:3px;margin-bottom:6px">'+r.ps.map(function(p){return '<span style="font-size:10px;background:#12121e;padding:2px 6px;border-radius:3px;color:#ccc">#'+p.id+' '+p.name+' ('+(p.role||'?')+')</span>';}).join('')+'</div><button class="btn btn-sm btn-cyan" onclick="delR('+i+')">🗑️</button></div>';});l.innerHTML=h;}
function saveR(){var ps=S.ps.map(function(p){return{id:p.id,name:p.name,role:p.role,camp:p.camp};});var r={date:new Date().toISOString().slice(0,10),ps:ps,sf:S.sf,winner:'',deaths:[].concat(S.deaths)};S.replays.unshift(r);lsr();rrl();toast('💾 已保存！');}
function delR(i){S.replays.splice(i,1);lsr();rrl();}
function clearR(){S.replays=[];lsr();rrl();toast('🗑️ 已清空');}
function exportR(){var d=JSON.stringify(S.replays,null,2);var b=new Blob([d],{type:'application/json'});var u=URL.createObjectURL(b);var a=document.createElement('a');a.href=u;a.download='wolf-replays.json';a.click();URL.revokeObjectURL(u);toast('📤 导出成功');}

// === MVP ===
function rmvp(m){m.innerHTML=hdr('🏆','MVP榜')+'<div class="section-body"><div class="card-grid" id="mg"></div><div style="margin-top:12px;display:flex;gap:8px"><button class="btn btn-cyan" onclick="addM()">➕ 添加MVP</button></div></div></div>';rmc();}
function rmc(){var g=document.getElementById('mg');if(!g)return;if(!S.mvp.length){g.innerHTML='<div style="color:#666;font-size:12px;padding:16px;text-align:center;grid-column:1/-1">暂无MVP记录</div>';return;}var h='';S.mvp.forEach(function(c,i){var m=i===0?'🥇':i===1?'🥈':i===2?'🥉':'',rc=i===0?' gold':i===1?' silver':i===2?' bronze':'';h+='<div class="stat-card'+rc+'"><div style="font-size:20px">'+m+'</div><div class="stat-name">'+c.name+'</div><div class="stat-val">'+c.count+'</div><div class="stat-sub">MVP次数</div><button class="btn btn-sm btn-cyan" style="margin-top:4px" onclick="delM('+i+')">🗑️</button></div>';});g.innerHTML=h;}
function addM(){var n=prompt('MVP玩家名称：');if(!n)return;var e=S.mvp.find(function(c){return c.name===n;});if(e)e.count++;else S.mvp.push({name:n,count:1});S.mvp.sort(function(a,b){return b.count-a.count;});lsm();rmc();toast('🏆 '+n+' MVP +1！');}
function delM(i){S.mvp.splice(i,1);lsm();rmc();}

// === WINRATE ===
function rwinrate(m){m.innerHTML=hdr('📈','玩家胜率')+'<div class="section-body"><div id="ws"></div></div></div>';rws();}
function rws(){var e=document.getElementById('ws');if(!e)return;if(!S.replays.length){e.innerHTML='<div style="color:#666;font-size:12px;padding:16px;text-align:center">暂无对局记录</div>';return;}var pm={};S.replays.forEach(function(g){var w=g.winner;g.ps.forEach(function(p){if(!pm[p.name])pm[p.name]={win:0,total:0};pm[p.name].total++;if((w==='wolf'&&p.camp==='wolf')||(w==='good'&&(p.camp==='god'||p.camp==='villager'))||(w==='third'&&p.camp==='third'))pm[p.name].win++;});});var st=Object.keys(pm).sort(function(a,b){return pm[b].win/pm[b].total-pm[a].win/pm[a].total;});var h='<div class="stat-grid">';st.forEach(function(name,i){var d=pm[name],p=Math.round(d.win/d.total*100),c=p>=60?'#ff2d7b':p>=40?'#00f0ff':'#888',rc=i===0?' gold':i===1?' silver':i===2?' bronze':'';h+='<div class="stat-card'+rc+'"><div class="stat-name">'+name+'</div><div class="stat-val" style="color:'+c+'">'+p+'%</div><div class="bar"><div class="bar-fill '+(p>=60?'bar-pink':'bar-cyan')+'" style="width:'+p+'%"></div></div><div class="stat-sub">'+d.win+'胜 / '+d.total+'局</div></div>';});h+='</div>';e.innerHTML=h;}

// === SCORE ===
function rscore(m){m.innerHTML=hdr('🌟','积分榜')+'<div class="section-body"><div id="ss"></div></div></div>';rss();}
function rss(){var e=document.getElementById('ss');if(!e)return;var sm={};S.replays.forEach(function(g){var w=g.winner;g.ps.forEach(function(p){if(!sm[p.name])sm[p.name]=0;var iw=(w==='wolf'&&p.camp==='wolf')||(w==='good'&&(p.camp==='god'||p.camp==='villager'))||(w==='third'&&p.camp==='third');sm[p.name]+=iw?2:1;});});S.mvp.forEach(function(c){if(!sm[c.name])sm[c.name]=0;sm[c.name]+=c.count;});var st=Object.keys(sm).sort(function(a,b){return sm[b]-sm[a];});if(!st.length){e.innerHTML='<div style="color:#666;font-size:12px;padding:16px;text-align:center">暂无数据</div>';return;}var h='<div class="stat-grid">';st.forEach(function(name,i){var rc=i===0?' gold':i===1?' silver':i===2?' bronze':'',m=i===0?'🥇':i===1?'🥈':i===2?'🥉':'',c=i===0?'#ffd700':i===1?'#c0c0c0':i===2?'#cd7f32':'#00f0ff';h+='<div class="stat-card'+rc+'"><div style="font-size:18px">'+m+'</div><div class="stat-name">'+name+'</div><div class="stat-val" style="color:'+c+'">'+sm[name]+'</div><div class="stat-sub">积分</div></div>';});h+='</div>';e.innerHTML=h;}

// === INIT ===
function init(){ld();S.ps=[];for(var i=1;i<=12;i++)S.ps.push({id:i,name:'玩家'+i,role:'',camp:'',alive:true});rsb();rp();}
init();
</script>
</body>
</html>
